<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="ngrok-skip-browser-warning" content="true">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Airi Lab World v14</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0A0A14;font-family:'Press Start 2P','Courier New',monospace;overflow:hidden;user-select:none}
#header{height:36px;background:#1A1A2A;display:flex;align-items:center;justify-content:space-between;padding:0 8px;border-bottom:1px solid #303048;position:relative;z-index:100}
#tabs{display:flex;gap:0;height:36px}
.tab{height:36px;padding:0 16px;background:#2A2A3A;color:#889090;border:none;cursor:pointer;font-family:'Press Start 2P','Courier New',monospace;font-size:9px;letter-spacing:0.05em;border-right:1px solid #303048;border-top:1px solid #303048;position:relative;transition:background 0.1s}
.tab:hover{background:#303048}
.tab.active{background:#3A3A5A;color:#F8F8F8}
.tab.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:#F8F8F8}
#header-right{display:flex;align-items:center;gap:12px}
#clock{color:#78D8A8;font-size:9px;font-family:'Press Start 2P','Courier New',monospace;letter-spacing:0.1em}
#data-badge{font-size:8px;padding:2px 6px;background:#202838;color:#78D8A8;border:1px solid #304848;font-family:'Press Start 2P','Courier New',monospace;letter-spacing:0.05em}
#data-badge.offline{background:#383020;color:#D8A828;border-color:#485030}
#data-badge.simulated{background:#282030;color:#A878E8;border-color:#483868}
/* Mobile-first: office-wrap fills full viewport minus header */
#office-wrap{position:relative;width:100%;height:calc(100vh - 36px);overflow:hidden;background:#0A0A14;display:block}
#office-scale{transform-origin:top left;position:absolute;top:0;left:0}
#canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;cursor:crosshair}
#cards-view{display:none;width:100%;height:calc(100vh - 36px);overflow-y:auto;background:#0A0A14;padding:16px}
#cards-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:1400px;margin:0 auto}
.card{background:#1A1A28;border:1px solid #303048;padding:10px;cursor:pointer;display:flex;gap:10px;align-items:flex-start;transition:background 0.1s,border-color 0.1s;min-height:120px}
.card:hover{background:#1E2030;border-color:#4A5870}
.card.selected{background:#1A2840;border:2px solid #4A90D9}
.card-avatar{flex-shrink:0;image-rendering:pixelated;image-rendering:crisp-edges}
.card-info{flex:1;min-width:0}
.card-name{font-size:8px;color:#F8F8F8;font-weight:bold;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:'Press Start 2P','Courier New',monospace;letter-spacing:0.05em}
.card-role{font-size:6px;color:#889090;margin-bottom:4px;font-family:'Press Start 2P','Courier New',monospace;letter-spacing:0.05em}
.card-status{font-size:7px;margin-bottom:4px;display:flex;align-items:center;gap:4px;font-family:'Press Start 2P','Courier New',monospace}
.card-task{font-size:6px;color:#A8A8B8;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;font-family:'Press Start 2P','Courier New',monospace;letter-spacing:0.03em}
.card-progress-wrap{background:#282830;height:5px;width:100%;margin-bottom:3px}
.card-progress-bar{height:5px;background:#40C060;transition:width 0.3s}
.card-ts{font-size:6px;color:#606070;font-family:'Press Start 2P','Courier New',monospace}
.card-blocked{color:#E04040;font-size:10px;margin-top:3px}
.card-collab{color:#4080E0;font-size:10px;margin-top:2px}
.review-badge{display:inline-block;padding:1px 5px;border-radius:3px;font-size:9px;color:#fff;font-weight:bold;margin-left:4px;vertical-align:middle}
.prio-badge{font-size:9px;padding:1px 4px;border-radius:3px;color:#fff;font-weight:bold}
.prio-badge.crit{background:#E74C3C}
.prio-badge.high{background:#E67E22}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
/* Desktop side panel */
#side-panel{position:fixed;right:-400px;top:36px;width:380px;height:calc(100vh - 36px);background:#0E0E1A;border-left:2px solid #252535;z-index:200;overflow-y:auto;transition:right 0.2s ease-out}
#side-panel.open{right:0}
#side-panel-header{background:#1A1A2A;padding:10px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #303048;position:sticky;top:0;z-index:10;transition:background 0.3s}
#side-panel-header h2{font-size:14px;font-weight:700;color:#F8F8F8;margin:0}
.side-status-pill{font-size:9px;padding:2px 8px;border-radius:10px;font-weight:600;background:rgba(255,255,255,0.12);color:#eee;white-space:nowrap}
#side-close{background:none;border:none;color:#889090;cursor:pointer;font-size:18px;padding:4px 8px;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center}
#side-close:hover{color:#F8F8F8}
#side-content{padding:12px}
.side-avatar-wrap{text-align:center;margin-bottom:12px}
.side-avatar{image-rendering:pixelated;image-rendering:crisp-edges}
.side-name{font-size:11px;color:#F8F8F8;font-weight:bold;margin-bottom:2px;text-align:center}
.side-role{font-size:8px;color:#889090;text-align:center;margin-bottom:8px}
.side-section{margin-bottom:12px}
.side-section-title{font-size:7px;color:#4A90D9;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;border-bottom:1px solid #252535;padding-bottom:3px}
.side-desc{font-size:11px;color:#aaa;margin-bottom:8px;line-height:1.5}
.side-section h4{font-size:9px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.side-section ul{font-size:10px;color:#ccc;padding-left:14px;margin:0}
.side-section li{margin-bottom:2px}
.task-textarea{width:100%;height:60px;background:#1a1a2e;border:1px solid #333;color:#eee;font-size:10px;padding:6px;border-radius:4px;resize:none;margin-top:4px}
.task-send-btn{width:100%;margin-top:4px;padding:5px;background:#4080E0;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:10px}
.side-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;font-size:8px}
.side-label{color:#606070}
.side-value{color:#A8A8B8}
.side-progress-wrap{background:#282830;height:6px;width:100%;margin-top:4px}
.side-progress-bar{height:6px;background:#40C060;transition:width 0.3s}
#tooltip{position:fixed;pointer-events:none;z-index:300;display:none;background:#101018;border:1px solid #404858;padding:8px 10px;min-width:160px;font-size:8px;color:#E8E8E8;box-shadow:1px 1px 0 #606878;font-family:'Press Start 2P','Courier New',monospace;letter-spacing:0.05em}
#tooltip .tt-name{font-size:8px;color:#F8F8F8;font-weight:bold;margin-bottom:3px}
#tooltip .tt-role{color:#889090;margin-bottom:3px;font-size:7px}
#tooltip .tt-task{color:#A8A8B8;margin-bottom:4px;font-size:7px}
#tooltip .tt-progress-wrap{background:#282830;height:5px;width:80px;display:inline-block}
#tooltip .tt-progress-bar{height:5px;background:#40C060;display:block}
/* Mobile overrides */
@media (max-width:768px){
  #cards-grid{grid-template-columns:repeat(2,1fr)}
  /* Side panel as bottom sheet on mobile */
  #side-panel{
    right:auto !important;
    bottom:-100%;
    left:0;
    top:auto;
    width:100%;
    height:auto;
    max-height:70vh;
    border-left:none;
    border-top:2px solid #252535;
    border-radius:16px 16px 0 0;
    transition:bottom 0.3s ease-out;
  }
  #side-panel.open{bottom:0;right:auto !important}
  #side-content{padding:8px 12px 24px}
  #side-panel-header{padding:8px 12px}
}
</style>
</head>

// ==================== PATHFINDING ====================
function findPath(from, to) {
  const startKey = `${from.col},${from.row}`;
  const endKey = `${to.col},${to.row}`;
  if (startKey === endKey) return [];
  const queue = [[from, []]];
  const visited = new Set([startKey]);
  const dirs = [{dc:0,dr:-1},{dc:0,dr:1},{dc:-1,dr:0},{dc:1,dr:0}];
  while (queue.length > 0) {
    const [cur, path] = queue.shift();
    for (const {dc,dr} of dirs) {
      const nc = cur.col+dc, nr = cur.row+dr;
      const key = `${nc},${nr}`;
      if (nc<0||nc>=COLS||nr<0||nr>=ROWS) continue;
      if (!WALKABLE.has(key) || BLOCKED.has(key) || WALL_BLOCKED.has(key)) continue;
      if (visited.has(key)) continue;
      visited.add(key);
      const newPath = [...path, {col:nc,row:nr}];
      if (key === endKey) return newPath;
      queue.push([{col:nc,row:nr}, newPath]);
    }
  }
  return [];
}

function getFacing(from, to) {
  if (!to) return 'south';
  const dc = to.col - from.col;
  const dr = to.row - from.row;
  if (Math.abs(dc) >= Math.abs(dr)) return dc > 0 ? 'east' : 'west';
  return dr > 0 ? 'south' : 'north';
}

// ==================== WALK SYSTEM ====================
let walkTick = 0;
function doWalkTick() {
  walkTick++;
  AGENT_LIST.forEach(agent => {
    const st = agentState[agent.id];
    if (st.path.length > 0) {
      const next = st.path.shift();
      st.facing = getFacing(st.currentTile, next);
      st.currentTile = next;
      st.walkFrame = (st.walkFrame + 1) % 4;
      if (st.path.length === 0) {
        const cur = st.currentTile;
        st.atHome = (cur.col === agent.desk.col && cur.row === agent.desk.row);
        if (st.atHome) st.facing = 'south';
      }
    } else {
      st.walkFrame = 0;
      // Idle: wander around room randomly every 5-15 seconds
      if (st.status === 'idle') {
        st.idleTimer = (st.idleTimer || 0) + 1;
        if (st.idleTimer > st._idleWanderAt) {
          st.idleTimer = 0;
          st._idleWanderAt = 300 + Math.floor(Math.random() * 600);
          // 20% chance to walk to coffee tile
          if (Math.random() < 0.2) {
            walkTo(agent.id, COFFEE_TILE);
          } else {
            // Find room for this agent
            const room = ROOMS.find(r => r.id === agent.room);
            if (room) {
              // Try up to 10 random tiles within room bounds
              for (let attempt = 0; attempt < 10; attempt++) {
                const tc = room.col + 1 + Math.floor(Math.random() * (room.w - 2));
                const tr = room.row + 1 + Math.floor(Math.random() * (room.h - 2));
                const tk = `${tc},${tr}`;
                if (WALKABLE.has(tk) && !BLOCKED.has(tk)) {
                  walkTo(agent.id, {col: tc, row: tr});
                  break;
                }
              }
            }
          }
        }
      }
      // Blocked agents: pace back and forth deterministically
      if (st.status === 'blocked' || st.status === 'error') {
        st.fidgetTimer = (st.fidgetTimer || 0) + 1;
        if (st.fidgetTimer > 8) {
          st.fidgetTimer = 0;
          const paceDir = (Math.floor(walkTick / 8) % 2 === 0) ? 1 : -1;
          const paceTile = {col: agent.desk.col + paceDir, row: agent.desk.row};
          const pk = `${paceTile.col},${paceTile.row}`;
          if (WALKABLE.has(pk) && !BLOCKED.has(pk)) {
            walkTo(agent.id, paceTile);
          }
        }
      }
    }
  });
}

const WALL_BLOCKED = new Set();
function buildWallBlockedSet() {
  ROOMS.forEach(room => {
    for (let c = room.col; c < room.col + room.w; c++) {
      for (let r = room.row; r < room.row + room.h; r++) {
        const isPerimeter = (c === room.col || c === room.col + room.w - 1 ||
                             r === room.row || r === room.row + room.h - 1);
        if (isPerimeter) WALL_BLOCKED.add(`${c},${r}`);
      }
    }
  });
  const doors = [
    {c:3,r:5},{c:4,r:5},{c:14,r:5},{c:15,r:5},{c:25,r:5},{c:26,r:5},
    {c:9,r:10},{c:9,r:11},{c:11,r:9},{c:18,r:9},{c:11,r:14},{c:18,r:14},
    {c:20,r:10},{c:20,r:11},{c:5,r:14},{c:6,r:14},{c:14,r:14},{c:15,r:14},
  ];
  doors.forEach(({c,r}) => WALL_BLOCKED.delete(`${c},${r}`));
}
buildWallBlockedSet();

function walkTo(agentId, targetTile) {
  const st = agentState[agentId];
  const tKey = `${targetTile.col},${targetTile.row}`;
  const cKey = `${st.currentTile.col},${st.currentTile.row}`;
  if (tKey === cKey) return;
  if (WALL_BLOCKED.has(tKey)) return;
  st.targetTile = {...targetTile};
  st.path = findPath(st.currentTile, targetTile);
}

function walkHome(agentId) {
  const agent = AGENT_LIST.find(a => a.id === agentId);
  if (agent) walkTo(agentId, agent.desk);
}

function applyStatus(agentId, status, task, progress, blockedBy, collabWith, priority) {
  const st = agentState[agentId];
  const agent = AGENT_LIST.find(a => a.id === agentId);
  const prevStatus = st.status;
  st.status = status;
  st.last_updated = Date.now();
  st.task = task || '';
  st.progress = progress || 0;
  st.blocked_by = blockedBy || null;
  st.collaborating_with = collabWith || null;
  st.priority = priority || null;

  if (status === 'coffee_break') {
    walkTo(agentId, COFFEE_TILE);
  } else if (status === 'working') {
    // Working agents STAY at desk — return home if away
    const cur = st.currentTile;
    if (cur.col !== agent.desk.col || cur.row !== agent.desk.row) {
      walkHome(agentId);
    } else {
      // Already at desk, clear any leftover path
      st.path = [];
    }
  } else if (status === 'idle') {
    // Idle agents stay at desk too — fidget handled in doWalkTick
    const cur = st.currentTile;
    if (cur.col !== agent.desk.col || cur.row !== agent.desk.row) {
      walkHome(agentId);
    }
  } else if (prevStatus === 'coffee_break' && status !== 'coffee_break') {
    walkHome(agentId);
  }
}

const meetingState = {};
function processMeetings(queueData) {
  if (!queueData) return;
  const meetAOccupied = [];
  const meetBOccupied = [];
  MEETING_PAIRS.forEach(([a1, a2, room]) => {
    const s1 = agentState[a1]; const s2 = agentState[a2];
    if (!s1 || !s2) return;
    const collab = (s1.collaborating_with === a2 || s2.collaborating_with === a1) &&
                   (s1.status === 'in_meeting' || s1.status === 'reviewing' ||
                    s2.status === 'in_meeting' || s2.status === 'reviewing');
    if (meetingState[a1] && meetingState[a2]) return;
    if (!collab) {
      if (meetingState[a1]) delete meetingState[a1];
      if (meetingState[a2]) delete meetingState[a2];
      return;
    }
    const seats = room === 'A' ? MEET_A_SEATS : MEET_B_SEATS;
    const occupied = room === 'A' ? meetAOccupied : meetBOccupied;
    if (occupied.length + 2 > seats.length) return;
    const seat1 = seats[occupied.length];
    const seat2 = seats[occupied.length + 1];
    occupied.push(a1, a2);
    meetingState[a1] = { roomId: room }; meetingState[a2] = { roomId: room };
    walkTo(a1, seat1); walkTo(a2, seat2);
  });
}

let lastGoodData = null;
let dataSource = 'SIMULATED';
let _firstLoad = true;
async function fetchQueue() {
  try {
    const resp = await fetch('/data/pipeline/work-queue.json', {cache:'no-store'});
    if (!resp.ok) throw new Error('non-ok');
    const data = await resp.json();
    lastGoodData = data; dataSource = 'LIVE';
    updateBadge('LIVE', false); applyQueueData(data);
  } catch(e) {
    if (lastGoodData) { dataSource = 'CACHED'; updateBadge('CACHED', true); }
    else { dataSource = 'SIMULATED'; updateBadge('SIM', false, true); }
  }
  if (_firstLoad) { _firstLoad = false; initAgentPositions(); }
}
function updateBadge(text, offline, sim) {
  const el = document.getElementById('data-badge');
  el.textContent = text;
  el.className = offline ? 'offline' : (sim ? 'simulated' : '');
}
function applyQueueData(data) {
  // Support both array and {queue:[...]} format
  const entries = Array.isArray(data) ? data : (data.queue || []);
  // Reset all to idle first
  AGENT_LIST.forEach(a => applyStatus(a.id, 'idle', '', 0, null, null, 'normal'));
  // Apply latest entry per assignee (last wins)
  const byAgent = {};
  entries.forEach(entry => {
    const id = entry.assignee || entry.agent;
    if (!id) return;
    byAgent[id] = entry;
  });
  Object.entries(byAgent).forEach(([id, entry]) => {
    const agent = AGENT_LIST.find(a => a.id === id || a.name === id);
    if (!agent) return;
    // Map work-queue status to display status
    let status = entry.status || 'idle';
    if (status === 'running' || status === 'in_progress') status = 'working';
    else if (status === 'done' || status === 'completed') status = 'idle';
    else if (status === 'failed' || status === 'error') status = 'blocked';
    else if (status === 'pending') status = 'waiting';
    else if (!['working','idle','blocked','waiting','coffee_break','in_meeting','thinking','reviewing'].includes(status)) status = 'idle';
    const task = entry.payload?.title || entry.payload?.task || entry.payload?.project || entry.type || '';
    applyStatus(agent.id, status, task, entry.progress||0,
      entry.blocked_by, entry.collaborating_with, entry.priority||'normal');
    agentState[agent.id].last_updated = entry.completed_at || entry.started_at || entry.created_at || '';
  });
  processMeetings(entries);
  if (currentTab === 'cards') updateCards();
}

function darken(hex, factor) {
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return '#'+[r,g,b].map(v=>Math.min(255,Math.round(v*factor)).toString(16).padStart(2,'0')).join('');
}

  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);

}

function spriteForAgent(agent, frame) {
  const oc = document.createElement('canvas');

  else drawAgent(ctx2, 0, 0, agent.spriteKey, frame||0);
  return oc;
}

const spriteCache = {};
function getSprite(agentId, frame) {
  const key = `${agentId}_${frame}`;
  if (!spriteCache[key]) {
    const agent = AGENT_LIST.find(a => a.id === agentId);
    spriteCache[key] = spriteForAgent(agent, frame);

}

// ==================== FLOOR TILE PATTERNS ====================
function makeFloorPattern(ctx2, type) {
  const pc = document.createElement('canvas');
  pc.width = 48; pc.height = 48;
  const pctx = pc.getContext('2d');
  switch(type) {
    case 'wood': case 'wood2': case 'wood3': {
      const baseColor = type==='wood'?'#C8A46E':type==='wood2'?'#D8B880':'#E8C890';
      const darkLine = '#A07848'; const highlight = '#D4B478';
      pctx.fillStyle = baseColor; pctx.fillRect(0,0,48,48);
      [0,16,32].forEach(y => {
        pctx.fillStyle = highlight; pctx.fillRect(0,y,48,3);
        if(y>0){pctx.fillStyle=darkLine;pctx.fillRect(0,y,48,2);}
      });
      pctx.fillStyle='rgba(160,120,72,0.2)';
      for(let x=0;x<48;x+=8) pctx.fillRect(x,0,1,48);
      break;
    }
    case 'tech': case 'techQA': {
      const base = type==='techQA'?'#DDE8EE':'#E8EEF4';
      pctx.fillStyle=base; pctx.fillRect(0,0,48,48);
      pctx.fillStyle='#C8D4DC';
      pctx.fillRect(24,0,1,48); pctx.fillRect(0,24,48,1);
      [[1,1],[1,46],[46,1],[46,46]].forEach(([x,y])=>{
        pctx.fillStyle='#B0C0CC'; pctx.fillRect(x,y,2,2);
      });
      break;
    }
    case 'carpetBlue': {
      pctx.fillStyle='#2A4A8C'; pctx.fillRect(0,0,48,48);
      // Diamond pattern
      pctx.fillStyle='#3A5AA0';
      for(let cy2=0;cy2<3;cy2++) for(let cx2=0;cx2<3;cx2++) {
        pctx.fillRect(cx2*16+5,cy2*16+7,6,2);
        pctx.fillRect(cx2*16+7,cy2*16+5,2,6);
      }
      pctx.fillStyle='#1A3A7A'; pctx.fillRect(0,0,48,2); pctx.fillRect(0,46,48,2);
      pctx.fillRect(0,0,2,48); pctx.fillRect(46,0,2,48);
      break;
    }
    case 'carpetGreen': {
      pctx.fillStyle='#6BAF7A'; pctx.fillRect(0,0,48,48);
      pctx.fillStyle='#589A68';
      for(let cy=0;cy<3;cy++) for(let cx=0;cx<3;cx++) pctx.fillRect(cx*16+7,cy*16+7,2,2);
      pctx.fillStyle='#4A8A58'; pctx.fillRect(0,0,48,1); pctx.fillRect(0,47,48,1);
      break;
    }
    case 'terra': {
      pctx.fillStyle='#D4956A'; pctx.fillRect(0,0,48,48);
      pctx.fillStyle='#E8A870'; pctx.fillRect(0,0,15,15);
      pctx.fillStyle='#B07050'; pctx.fillRect(33,33,15,15);
      pctx.fillStyle='#C07858'; pctx.fillRect(24,0,1,48); pctx.fillRect(0,24,48,1);
      break;
    }
    default: { pctx.fillStyle='#A0A0A0'; pctx.fillRect(0,0,48,48); }
  }
  return ctx2.createPattern(pc, 'repeat') || null;
}

function drawMeetingTable(ctx2, tx, ty) {
  // Completely flat rectangular table for Meeting Room A
  const tw = 3*T, th = 2*T; // Width: three tiles; Height: two tiles
  tx = Math.floor(tx);
  ty = Math.floor(ty);

  // Table outer border (4px thick, clearly rectangular)
  ctx2.fillStyle = '#2E1E1C'; // Deep brown
  ctx2.fillRect(tx - 4, ty - 4, tw + 8, th + 8);

  // Table inner surface (solid fill)
  ctx2.fillStyle = '#A87840'; // Warm wood-tone
  ctx2.fillRect(tx, ty, tw, th);

  // Explicit corner anchors for visual clarity
  ctx2.fillStyle = '#E8D080'; // Light yellow markers
  ctx2.fillRect(tx, ty, 6, 6);
  ctx2.fillRect(tx + tw - 6, ty, 6, 6);
  ctx2.fillRect(tx, ty + th - 6, 6, 6);
  ctx2.fillRect(tx + tw - 6, ty + th - 6, 6, 6);

  // Table base shadow for depth (flat strip at the bottom edge)
  ctx2.fillStyle = '#483928';
  ctx2.fillRect(tx, ty + th, tw, 4);

  // Ensure rectangle proportions are sharp (no curved illusions)
}

// ==================== CANVAS RENDERING ====================
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const floorPatterns = {};
function getPattern(type) {
  if (!floorPatterns[type]) floorPatterns[type] = makeFloorPattern(ctx, type);
  return floorPatterns[type];
}

function drawFloor() {
  ROOMS.forEach(room => {
    const pattern = getPattern(room.floorType || 'stone');
    ctx.fillStyle = pattern || '#C8904A';
    ctx.fillRect(room.col*T, room.row*T, room.w*T, room.h*T);
    // North wall thin strip
    ctx.fillStyle = room.wallColor;
    ctx.fillRect(room.col*T, room.row*T, room.w*T, 4);
  });

  // Corridors
  const corridorPattern = getPattern('stone') || '#A0A0A0';
  ctx.fillStyle = corridorPattern;
  ctx.fillRect(8*T, 0, T, 6*T);
  ctx.fillRect(21*T, 0, T, 6*T);
  ctx.fillRect(0, 6*T, CANVAS_W, T);
  ctx.fillRect(10*T, 7*T, T, 10*T);
  ctx.fillRect(19*T, 7*T, T, 10*T);
  ctx.fillRect(0, 17*T, CANVAS_W, T);

  // ── WALLS: 5px black lines, with gaps where doors are ──
  ctx.strokeStyle = '#111111';
  ctx.lineWidth = 5;
  ctx.lineCap = 'square';

  // Build gap map: hGaps[y_px] = [[x1,x2],...], vGaps[x_px] = [[y1,y2],...]
  const hGaps = {}, vGaps = {};
  DOOR_POSITIONS.forEach(({c, r, axis}) => {
    ROOMS.forEach(room => {
      const rl=room.col, rr=room.col+room.w, rt=room.row, rb=room.row+room.h;
      if(axis==='h') {
        // bottom wall at y=rb*T
        if(r===rb-1 && c>=rl && c<rr) {
          const wy=rb*T; if(!hGaps[wy]) hGaps[wy]=[]; hGaps[wy].push([c*T,(c+1)*T]);
        }
        // top wall at y=rt*T
        if(r===rt && c>=rl && c<rr) {
          const wy=rt*T; if(!hGaps[wy]) hGaps[wy]=[]; hGaps[wy].push([c*T,(c+1)*T]);
        }
      } else {
        // right wall at x=rr*T
        if(c===rr-1 && r>=rt && r<rb) {
          const wx=rr*T; if(!vGaps[wx]) vGaps[wx]=[]; vGaps[wx].push([r*T,(r+1)*T]);
        }
        // left wall at x=rl*T
        if(c===rl && r>=rt && r<rb) {
          const wx=rl*T; if(!vGaps[wx]) vGaps[wx]=[]; vGaps[wx].push([r*T,(r+1)*T]);
        }
      }
    });
  });

  function drawSegmented(isHoriz, fixedPx, start, end, gaps) {
    const relevant = (gaps||[]).filter(([a,b]) => a>=start && b<=end);
    relevant.sort((a,b)=>a[0]-b[0]);
    let cur = start;
    relevant.forEach(([a,b]) => {
      if(cur < a) {
        ctx.beginPath();
        if(isHoriz){ctx.moveTo(cur,fixedPx);ctx.lineTo(a,fixedPx);}
        else{ctx.moveTo(fixedPx,cur);ctx.lineTo(fixedPx,a);}
        ctx.stroke();
      }
      cur = b;
    });
    if(cur < end) {
      ctx.beginPath();
      if(isHoriz){ctx.moveTo(cur,fixedPx);ctx.lineTo(end,fixedPx);}
      else{ctx.moveTo(fixedPx,cur);ctx.lineTo(fixedPx,end);}
      ctx.stroke();
    }
  }

  ROOMS.forEach(room => {
    const xl=room.col*T+2.5, xr=(room.col+room.w)*T-2.5;
    const yt=room.row*T+2.5, yb=(room.row+room.h)*T-2.5;
    drawSegmented(true,  yt, xl, xr, hGaps[room.row*T]);
    drawSegmented(true,  yb, xl, xr, hGaps[(room.row+room.h)*T]);
    drawSegmented(false, xl, yt, yb, vGaps[room.col*T]);
    drawSegmented(false, xr, yt, yb, vGaps[(room.col+room.w)*T]);
  });
  ctx.lineWidth = 1;

  // Room labels — centered pill style
  ROOMS.forEach(room => {
    if (room.id === 'break') return;
    const label = room.name;
    ctx.font = '8px "Press Start 2P","Courier New",monospace';
    const tw = ctx.measureText(label).width;
    const lx = room.col*T + room.w*T/2;
    const ly = room.row*T + 20;
    const pad = 4;
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    // Simple rounded-ish rect via multiple fillRect
    ctx.fillRect(lx - tw/2 - pad, ly - 11, tw + pad*2, 14);
    ctx.fillStyle = 'rgba(255,255,255,0.75)';
    ctx.textAlign = 'center';
    ctx.fillText(label, lx, ly);
    ctx.textAlign = 'left';
  });

  // Doors
  drawDoors(ctx);
}

function drawFurniture() {

    const x = col*T, y = row*T;
    // 3/4 view: desk drawn in furniture layer (on top of agents)
    // Desk fills bottom 60% of tile so it clearly covers agent lower body
    const dTop = y + 8;  // start higher in tile
    const dH = T - 4;    // tall enough to cover agent legs
    
    // Front face (depth, most visible)
    ctx.fillStyle = '#5C3D0A';
    ctx.fillRect(x, dTop + dH - 10, T, 10);
    // Main surface
    ctx.fillStyle = '#8B6914';
    ctx.fillRect(x, dTop, T, dH - 10);
    // Top highlight
    ctx.fillStyle = '#B89A30';
    ctx.fillRect(x, dTop, T, 5);
    // Outline
    ctx.strokeStyle = '#3A2005';
    ctx.lineWidth = 2;
    ctx.strokeRect(x+1, dTop+1, T-2, dH-2);
    ctx.lineWidth = 1;

    if (hasMonitor) {
      ctx.fillStyle = '#0A0A1E';
      ctx.fillRect(x+8, dTop+2, T-16, dH-14);

  // Cup tray
  ctx.fillStyle = '#281A0E';
  ctx.fillRect(cmX+2, cmY+28, 24, 6);
  // Steam dots animated (3 dots drifting up)
  const steamOffsets = [0, Math.PI*0.66, Math.PI*1.33];
  steamOffsets.forEach((phase, i) => {
    const drift = (animTick * 0.5 + phase * 5) % 18;
    const alpha = 0.25 + 0.4 * Math.sin(animTick * 0.1 + phase);
    ctx.fillStyle = `rgba(220,220,220,${alpha})`;
    ctx.beginPath();
    ctx.arc(cmX + 8 + i*6, cmY - 8 - drift, 2.5, 0, Math.PI*2);
    ctx.fill();
  });
  // 2 chairs: 10x10px squares
  ctx.fillStyle = '#6B4C1E';
  ctx.fillRect(12*T + 36, 15*T + 20, 10, 10);
  ctx.fillRect(12*T + 50, 15*T + 20, 10, 10);
  ctx.fillStyle = '#4A3010';
  ctx.fillRect(12*T + 36, 15*T + 20, 2, 10);
  ctx.fillRect(12*T + 50, 15*T + 20, 2, 10);
  // Floor text
  ctx.font = '7px "Press Start 2P","Courier New",monospace';
  ctx.fillStyle = 'rgba(255,220,160,0.5)';
  ctx.textAlign = 'center';
  ctx.fillText('☕ BREAK', 12*T + T, 15*T + T - 4);
  ctx.textAlign = 'left';
  // Fridge
  ctx.fillStyle='#C8D8E8'; ctx.fillRect(14*T+4,15*T+4,T-8,T-4);
  ctx.fillStyle='#A8B8C8'; ctx.fillRect(14*T+4,15*T+22,T-8,2);
  ctx.fillStyle='#6888A8'; ctx.fillRect(14*T+T-12,15*T+8,4,12);
  // Sofa cluster
  ctx.fillStyle='#7A4A88'; ctx.fillRect(20*T,14*T+4,5*T,T-8);
  ctx.fillStyle='#9068A8'; ctx.fillRect(20*T+4,14*T+8,5*T-8,T-16);
  ctx.fillStyle='#7A4A88';
  ctx.fillRect(20*T,14*T+4,T,T-8);
  ctx.fillRect(24*T,14*T+4,T,T-8);
  // Snack shelf
  ctx.fillStyle='#A07040'; ctx.fillRect(2*T,15*T+4,2*T,T-4);
  ['#F84040','#F8B840','#40B840','#8040F8'].forEach((c,i)=>{
    ctx.fillStyle=c; ctx.fillRect(2*T+6+i*10,15*T+8,8,14);
  });
  plant(0,14,true); plant(1,14); plant(29,15);
}

// ==================== CHAIR DRAWING ====================
function drawChair(ctx2, tileX, tileY) {
  const cx = tileX + (T - 20) / 2;
  const cy = tileY + T - 20;
  ctx2.fillStyle = '#6B3A10';
  ctx2.fillRect(Math.round(cx), Math.round(cy+4), 20, 10);
  ctx2.fillStyle = '#4A2808';
  ctx2.fillRect(Math.round(cx), Math.round(cy+4), 3, 10);
  ctx2.fillStyle = '#8A5020';
  ctx2.fillRect(Math.round(cx+3), Math.round(cy+4), 17, 2);
  ctx2.fillStyle = '#6B3A10';
  ctx2.fillRect(Math.round(cx+2), Math.round(cy), 16, 5);
  ctx2.fillStyle = '#4A2808';
  ctx2.fillRect(Math.round(cx+2), Math.round(cy), 2, 5);
  ctx2.fillStyle = '#4A2808';
  ctx2.fillRect(Math.round(cx+1), Math.round(cy+14), 3, 5);
  ctx2.fillRect(Math.round(cx+16), Math.round(cy+14), 3, 5);
}

const STATUS_COLORS = {
  idle:'#909090', working:'#40C860', blocked:'#E04040',
  in_meeting:'#4888D8', reviewing:'#9848C8', coffee_break:'#B07030',
  done:'#F0C020', error:'#E02020', default:'#909090'
};

let animTick = 0;
setInterval(() => { animTick++; }, 50);

// ==================== STATUS BUBBLE — SMALL ====================
function getStatusBubble(status) {
  switch(status) {
    case 'working': case 'in_progress': return { color:'#E84040', text:'BUSY' };
    case 'in_meeting': case 'reviewing': return { color:'#E84040', text:'MTG' };
    case 'blocked': case 'error': return { color:'#F5A623', text:'BLK' };
    case 'pending': case 'pending_review': case 'pending_test': case 'waiting': return { color:'#F5A623', text:'WAIT' };
    case 'coffee_break': return { color:'#F5C84A', text:'☕' };
    case 'thinking': return { color:'#F5A623', text:'...' };
    case 'idle': return { color:'#52C41A', text:'ZZ' };
    case 'done': return { color:'#52C41A', text:'✓' };
    default: return null;
  }
}

function drawStatusBubble(ctx2, cx, cy, status) {
  const bubble = getStatusBubble(status);
  if (!bubble) return;
  ctx2.save();
  ctx2.font = 'bold 11px "Press Start 2P","Courier New",monospace';
  const tw = ctx2.measureText(bubble.text).width;
  const pw = tw + 20, ph = 22;
  const px2 = cx - pw/2, py2 = cy - ph/2;
  // Drop shadow
  ctx2.fillStyle = 'rgba(0,0,0,0.8)';
  ctx2.fillRect(px2+2, py2+2, pw, ph);
  // Pill background
  ctx2.fillStyle = bubble.color;
  ctx2.fillRect(px2, py2, pw, ph);
  // White border
  ctx2.strokeStyle = 'rgba(255,255,255,0.6)';
  ctx2.lineWidth = 1.5;
  ctx2.strokeRect(px2+1, py2+1, pw-2, ph-2);
  ctx2.lineWidth = 1;
  // Text
  ctx2.fillStyle = '#FFFFFF';
  ctx2.textAlign = 'center';
  ctx2.textBaseline = 'middle';
  ctx2.fillText(bubble.text, cx, cy + 1);
  ctx2.restore();
  ctx2.textBaseline = 'alphabetic';
}

// ==================== RENDER LOOP ====================
let animFrame = null;

function render(timestamp) {
  try {
    ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
    ctx.fillStyle = '#0A0A14';
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
    drawFloor();
    drawAgentsFixed(timestamp);  // agents first (behind desks)
    drawFurniture();             // desks/furniture on top (3/4 depth)
  } catch(e) {
    console.error('[render error]', e);
  }
  animFrame = requestAnimationFrame(render);
}

function drawAgentsFixed(timestamp) {
  const sorted = [...AGENT_LIST].sort((a,b) =>
    agentState[a.id].currentTile.row - agentState[b.id].currentTile.row
  );
  sorted.forEach(agent => {
    const st = agentState[agent.id];
    const tileCol = st.currentTile.col;
    const tileRow = st.currentTile.row;
    const tileX = tileCol * T, tileY = tileRow * T;
    const spriteW = 16*S, spriteH = 24*S;
    const spriteX = tileX + (T - spriteW)/2;
    const spriteY = tileY - spriteH + T;

    let frame = 0;
    if (st.path.length > 0) {
      frame = Math.floor(timestamp / 100) % 4;
    } else if (st.status === 'working') {
      frame = Math.floor(timestamp / 600) % 2;
    }
    const bob = (st.status === 'idle') ? Math.round(Math.sin(timestamp/1500 + st.animPhase)) : 0;

    if (st.priority === 'critical') {
      const pulse = 0.5 + 0.5*Math.sin(timestamp/300);
      ctx.shadowColor = `rgba(255,32,32,${pulse})`;
      ctx.shadowBlur = 16;
    } else if (st.priority === 'high') {
      ctx.shadowColor = 'rgba(255,128,32,0.5)';
      ctx.shadowBlur = 10;
    }

    // Draw chair behind agent
    drawChair(ctx, agent.desk.col * T, agent.desk.row * T);

    // Draw sprite
    const sp = getSprite(agent.id, frame);
    ctx.drawImage(sp, spriteX, spriteY + bob, spriteW, spriteH);
    ctx.shadowBlur = 0; ctx.shadowColor = 'transparent';

    const spriteCX = spriteX + spriteW / 2;
    const spriteTop = spriteY + bob;
    const spriteBottom = spriteY + bob + spriteH;

    // Status speech bubble — above head, colored bg + text + tail pointing down to agent
    if (st.status && st.status !== 'idle') {
      const bubble = getStatusBubble(st.status);      if (bubble) {
        ctx.save();
        ctx.font = 'bold 7px "Courier New",monospace';
        const tw = ctx.measureText(bubble.text).width;
        const pw = tw + 10, ph = 13;
        const bx = spriteCX - pw/2, by = spriteTop - ph - 8;
        // Shadow
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(bx+2, by+2, pw, ph);
        // Bubble bg
        ctx.fillStyle = bubble.color;
        ctx.fillRect(bx, by, pw, ph);
        // White border
        ctx.strokeStyle = 'rgba(255,255,255,0.7)';
        ctx.lineWidth = 1;
        ctx.strokeRect(bx, by, pw, ph);
        // Tail (small triangle pointing down toward agent head)
        ctx.fillStyle = bubble.color;
        ctx.beginPath();
        ctx.moveTo(spriteCX - 4, by + ph);
        ctx.lineTo(spriteCX + 4, by + ph);
        ctx.lineTo(spriteCX, by + ph + 5);
        ctx.closePath();
        ctx.fill();
        // Text
        ctx.fillStyle = '#FFFFFF';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(bubble.text, spriteCX, by + ph/2);
        ctx.restore();
        ctx.textBaseline = 'alphabetic';
      }
    } else if (st.status === 'idle') {
      // Show idle activity from AGENT_PROFILES
      const prof = AGENT_PROFILES[agent.id] || {};
      const acts = prof.idleActs;
      if (acts && acts.length) {
        const actText = acts[Math.floor(simTick / 60) % acts.length];
        ctx.save();
        ctx.font = '7px "Courier New",monospace';
        const tw = ctx.measureText(actText).width;
        const pw = tw + 10, ph = 13;
        const bx = spriteCX - pw/2, by = spriteTop - ph - 8;
        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        ctx.fillRect(bx+2, by+2, pw, ph);
        ctx.fillStyle = '#2A3A2A';
        ctx.fillRect(bx, by, pw, ph);
        ctx.strokeStyle = 'rgba(82,196,26,0.5)';
        ctx.lineWidth = 1;
        ctx.strokeRect(bx, by, pw, ph);
        ctx.fillStyle = '#52C41A';
        ctx.beginPath();
        ctx.moveTo(spriteCX - 4, by + ph);
        ctx.lineTo(spriteCX + 4, by + ph);
        ctx.lineTo(spriteCX, by + ph + 5);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#A8D8A8';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(actText, spriteCX, by + ph/2);
        ctx.restore();
        ctx.textBaseline = 'alphabetic';
      }
    }

    // Name label — BELOW feet (no overlap with bubble)
    ctx.font = 'bold 8px "Courier New",monospace';
    ctx.textAlign = 'center';
    const nw = ctx.measureText(agent.name).width;
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    ctx.fillRect(spriteCX - nw/2 - 3, spriteBottom + 2, nw + 6, 11);
    ctx.fillStyle = '#FFFFFF';
    ctx.fillText(agent.name, spriteCX, spriteBottom + 11);
    ctx.textAlign = 'left';

    // Progress bar
    if (st.status === 'working' && st.progress > 0) {
      const barY = tileY + T - 5, barW = T - 4;
      ctx.fillStyle = '#282830';
      ctx.fillRect(tileX + 2, barY, barW, 4);
      const pc = st.progress < 34 ? '#E04848' : st.progress < 67 ? '#E0B828' : '#40C060';
      ctx.fillStyle = pc;
      ctx.fillRect(tileX + 2, barY, Math.round(barW * st.progress / 100), 4);
    }

    // Collaboration line
    if (st.collaborating_with) {
      const other = AGENT_LIST.find(a => a.id === st.collaborating_with || a.name === st.collaborating_with);
      if (other) {
        const ost = agentState[other.id];
        ctx.save(); ctx.setLineDash([4,4]);
        ctx.strokeStyle = 'rgba(74,144,217,0.55)'; ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(tileX+T/2, tileY+T/2);
        ctx.lineTo(ost.currentTile.col*T+T/2, ost.currentTile.row*T+T/2);
        ctx.stroke(); ctx.restore();
      }
    }
    // Blocked line
    if (st.blocked_by) {
      const other = AGENT_LIST.find(a => a.id === st.blocked_by || a.name === st.blocked_by);
      if (other) {
        const ost = agentState[other.id];
        ctx.save(); ctx.setLineDash([3,4]);
        ctx.strokeStyle = 'rgba(224,64,64,0.65)'; ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(tileX+T/2, tileY+T/2);
        ctx.lineTo(ost.currentTile.col*T+T/2, ost.currentTile.row*T+T/2);
        ctx.stroke(); ctx.restore();
      }
    }
  });
}

// ==================== CANVAS CLICK ====================
const tooltip = document.getElementById('tooltip');
canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const scale = rect.width / CANVAS_W;
  const mx = (e.clientX - rect.left) / scale;
  const my = (e.clientY - rect.top) / scale;
  const tileCol = Math.floor(mx / T), tileRow = Math.floor(my / T);
  const clicked = AGENT_LIST.find(a => {
    const st = agentState[a.id];
    return st.currentTile.col === tileCol && st.currentTile.row === tileRow;
  });
  if (clicked) {
    showTooltip(e.clientX, e.clientY, clicked);
    openSidePanel(clicked.id);
  } else {
    tooltip.style.display = 'none';
  }
});
document.addEventListener('click', e => {
  if (!canvas.contains(e.target) && !tooltip.contains(e.target)) tooltip.style.display = 'none';
});

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showTooltip(cx, cy, agent) {
  const st = agentState[agent.id];
  tooltip.querySelector('.tt-name').textContent = agent.name;
  tooltip.querySelector('.tt-role').textContent = agent.role;
  tooltip.querySelector('.tt-task').textContent = st.task ? `Task: ${st.task.substring(0,40)}` : 'No active task';
  tooltip.querySelector('.tt-progress-bar').style.width = `${st.progress||0}%`;
  const pc = (st.progress||0)<34?'#E04848':(st.progress||0)<67?'#E0B828':'#40C060';
  tooltip.querySelector('.tt-progress-bar').style.background = pc;
  tooltip.querySelector('.tt-pct').textContent = `${st.progress||0}%`;
  const tipW=180,tipH=80;
  let tx=cx+12,ty=cy-20;
  if(tx+tipW>window.innerWidth) tx=cx-tipW-12;
  if(ty+tipH>window.innerHeight) ty=cy-tipH;
  tooltip.style.left=tx+'px'; tooltip.style.top=ty+'px'; tooltip.style.display='block';
}

// ==================== AGENT CARDS ====================
function timeAgo(ts) {
  if (!ts) return '';
  const d = Date.now() - ts;
  if (d < 60000) return 'just now';
  if (d < 3600000) return Math.floor(d/60000) + 'm ago';
  if (d < 86400000) return Math.floor(d/3600000) + 'h ago';
  return new Date(ts).toLocaleDateString();
}
function buildCards() {
  const cardsView = document.getElementById('cards-view');
  cardsView.innerHTML = '<div id="cards-grid"></div>';
  const grid = cardsView.querySelector('#cards-grid');
  AGENT_LIST.forEach(agent => {
    const st = agentState[agent.id];
    const card = document.createElement('div');
    card.className = 'card'; card.dataset.agentId = agent.id;
    const sp = getSprite(agent.id, 0);
    const ac = document.createElement('canvas');
    ac.width=64; ac.height=96; ac.className='card-avatar';
    ac.style.cssText=`width:64px;height:96px;border:2px solid ${DEPT_COLORS[agent.dept]||'#888'}`;
    const acc=ac.getContext('2d'); acc.imageSmoothingEnabled=false;
    acc.drawImage(sp,0,0,48,72,0,0,64,96);
    const sColor=STATUS_COLORS[st.status]||'#909090';
    const progColor=(st.progress||0)<34?'#E04848':(st.progress||0)<67?'#E0B828':'#40C060';
    const info=document.createElement('div'); info.className='card-info';
    const REVIEW_BADGE = {pending_review:{color:'#F5A623',text:'REVIEW'},approved:{color:'#27AE60',text:'OK'},needs_rework:{color:'#E74C3C',text:'REWORK'}};
    const reviewBadge = st.review_status && REVIEW_BADGE[st.review_status] ? `<span class="review-badge" style="background:${REVIEW_BADGE[st.review_status].color}">${REVIEW_BADGE[st.review_status].text}</span>` : '';
    const prioBadge = st.priority === 'critical' ? '<span class="prio-badge crit">🔴 CRIT</span>' : st.priority === 'high' ? '<span class="prio-badge high">🟠 HIGH</span>' : '';
    info.innerHTML=`
      <div class="card-name">${escHtml(agent.name)}${reviewBadge}${prioBadge}</div>
      <div class="card-role">${escHtml(agent.role)}</div>
      <div class="card-status"><span class="status-dot" style="background:${sColor}"></span><span style="color:${sColor};font-size:7px">${escHtml(st.status||'idle')}</span></div>
      <div class="card-task">${escHtml(st.task||'No active task')}</div>
      <div class="card-progress-wrap"><div class="card-progress-bar" style="width:${st.progress||0}%;background:${progColor}"></div></div>
      ${st.blocked_by ? `<div class="card-blocked">🚫 Blocked: ${escHtml(st.blocked_by)}</div>` : ''}
      ${st.collaborating_with ? `<div class="card-collab">🤝 With: ${escHtml(st.collaborating_with)}</div>` : ''}
      <div class="card-ts">${st.last_updated?timeAgo(st.last_updated):'No data'}</div>
    `;
    card.appendChild(ac); card.appendChild(info);
    card.addEventListener('click',()=>{
      document.querySelectorAll('.card').forEach(c=>c.classList.remove('selected'));
      card.classList.add('selected'); openSidePanel(agent.id);
    });
    grid.appendChild(card);
  });
}

function updateCards() {
  AGENT_LIST.forEach(agent => {
    const st = agentState[agent.id];
    const card = document.querySelector(`.card[data-agent-id="${agent.id}"]`);
    if (!card) return;
    const sColor=STATUS_COLORS[st.status]||'#909090';
    const progColor=(st.progress||0)<34?'#E04848':(st.progress||0)<67?'#E0B828':'#40C060';
    const dot=card.querySelector('.status-dot');
    const stLabel=card.querySelector('.card-status span:last-child');
    const task=card.querySelector('.card-task');
    const bar=card.querySelector('.card-progress-bar');
    const ts=card.querySelector('.card-ts');
    if(dot) dot.style.background=sColor;
    if(stLabel){stLabel.style.color=sColor;stLabel.textContent=st.status||'idle';}
    if(task) task.textContent=st.task||'No active task';
    if(bar){bar.style.width=`${st.progress||0}%`;bar.style.background=progColor;}
    if(ts) ts.textContent=st.last_updated?timeAgo(st.last_updated):'No data';
    // update blocked/collab
    let blocked = card.querySelector('.card-blocked');
    if (st.blocked_by) {
      if (!blocked) { blocked = document.createElement('div'); blocked.className='card-blocked'; ts.parentNode.insertBefore(blocked, ts); }
      blocked.textContent = '🚫 Blocked: ' + (st.blocked_by);
    } else if (blocked) blocked.remove();
    let collab = card.querySelector('.card-collab');
    if (st.collaborating_with) {
      if (!collab) { collab = document.createElement('div'); collab.className='card-collab'; ts.parentNode.insertBefore(collab, ts); }
      collab.textContent = '🤝 With: ' + (st.collaborating_with);
    } else if (collab) collab.remove();
    const ac=card.querySelector('canvas');
    if(ac){
      const acc=ac.getContext('2d'); acc.clearRect(0,0,64,96); acc.imageSmoothingEnabled=false;
      acc.drawImage(getSprite(agent.id,0),0,0,48,72,0,0,64,96);
    }
  });
}

// ==================== TAB SWITCHING ====================
let currentTab = 'office';
document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    const tab = btn.dataset.tab;
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (tab === 'office') {
      document.getElementById('office-wrap').style.display = 'block';
      document.getElementById('cards-view').style.display = 'none';
      currentTab = 'office';
      if (!animFrame) animFrame = requestAnimationFrame(render);
    } else {
      document.getElementById('office-wrap').style.display = 'none';
      document.getElementById('cards-view').style.display = 'block';
      currentTab = 'cards'; buildCards();
    }
  });
});

// ==================== AUTO-SCALE (mobile-fixed) ====================
function applyScale() {
  const wrap = document.getElementById('office-wrap');
  const containerW = wrap.clientWidth || window.innerWidth;
  const containerH = wrap.clientHeight || (window.innerHeight - 36);
  // Fill screen proportionally — use min so nothing gets cut off
  const scale = Math.min(containerW / CANVAS_W, containerH / CANVAS_H);
  const scaleEl = document.getElementById('office-scale');
  scaleEl.style.transform = `scale(${scale})`;
  scaleEl.style.transformOrigin = 'top left';
  // Center canvas horizontally when scale leaves horizontal space
  const scaledW = CANVAS_W * scale;
  const scaledH = CANVAS_H * scale;
  scaleEl.style.left = Math.max(0, (containerW - scaledW) / 2) + 'px';
  scaleEl.style.top = Math.max(0, (containerH - scaledH) / 2) + 'px';
}
window.addEventListener('resize', applyScale);

// ==================== CLOCK ====================
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
}
setInterval(updateClock, 1000);
updateClock();

// ==================== WALK TICK ====================
setInterval(() => {
  doWalkTick();
  if (dataSource === 'SIMULATED') runSimulation();
}, 200);

// ==================== SIMULATION ====================
let simTick = 0;
const SIM_TICKS_PER_STEP = 15;
function runSimulation() {
  simTick++;
  AGENT_LIST.forEach(agent => {
    const st = agentState[agent.id];
    const script = AGENT_SCRIPTS[agent.id] || ['working','idle'];
    const step = Math.floor(simTick / SIM_TICKS_PER_STEP) % script.length;
    const newStatus = script[step];
    if (newStatus === st.status) return;
    const taskList = AGENT_TASKS[newStatus] || [''];
    const taskIdx = (AGENT_TASK_IDX[agent.id] + step) % taskList.length;
    const task = taskList[taskIdx];
    const progress = newStatus === 'working' ? ((AGENT_TASK_IDX[agent.id] * 13 + step * 17) % 71) + 15 : 0;
    applyStatus(agent.id, newStatus, task, progress);
  });
  if (currentTab === 'cards') updateCards();
}

// ==================== DATA POLL ====================
fetchQueue();
setInterval(fetchQueue, 30000);
window.addEventListener('focus', fetchQueue);

// ==================== INIT: position agents from real state ====================
// Called after first fetchQueue() resolves — place each agent at correct tile
// based on their actual status, not hardcoded desk spawn.
function initAgentPositions() {
  AGENT_LIST.forEach((agent, idx) => {
    const st = agentState[agent.id];
    if (!st) return;
    // Determine starting tile from status
    let startTile;
    if (st.status === 'coffee_break') {
      // Scatter around coffee area so they don't stack
      const offsets = [{dc:0,dr:0},{dc:1,dr:0},{dc:-1,dr:0},{dc:0,dr:1},{dc:1,dr:1},{dc:-1,dr:1},{dc:2,dr:0},{dc:-2,dr:0}];
      const o = offsets[idx % offsets.length];
      startTile = {col: COFFEE_TILE.col + o.dc, row: COFFEE_TILE.row + o.dr};
    } else if (st.status === 'in_meeting') {
      // Place in meeting seats — assign evenly between room A and B
      const seats = [...MEET_A_SEATS, ...MEET_B_SEATS];
      startTile = seats[idx % seats.length];
    } else {
      // working / idle / blocked / thinking / etc — start at desk
      startTile = {...agent.desk};
    }
    // Validate tile is walkable, fallback to desk
    const key = `${startTile.col},${startTile.row}`;
    if (!WALKABLE.has(key) || BLOCKED.has(key) || WALL_BLOCKED.has(key)) {
      startTile = {...agent.desk};
    }
    st.currentTile = startTile;
    st.targetTile = startTile;
    st.path = [];
    st.atHome = (startTile.col === agent.desk.col && startTile.row === agent.desk.row);
    st.facing = st.status === 'coffee_break' ? 'south' : 'south';
  });
}

// Start render
animFrame = requestAnimationFrame(render);
applyScale();
</script>
