<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Airi Lab World v15</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0A0A14;font-family:'Press Start 2P','Courier New',monospace;overflow:hidden;user-select:none}
#header{height:36px;background:#1A1A2A;display:flex;align-items:center;justify-content:space-between;padding:0 8px;border-bottom:1px solid #303048;position:relative;z-index:100}
#tabs{display:flex;gap:0;height:36px}
.tab{height:36px;padding:0 16px;background:#2A2A3A;color:#889090;border:none;cursor:pointer;font-family:'Press Start 2P','Courier New',monospace;font-size:9px;letter-spacing:0.05em;border-right:1px solid #303048;border-top:1px solid #303048;position:relative;transition:background 0.1s}
.tab:hover{background:#303048}
.tab.active{background:#3A3A5A;color:#F8F8F8}
.tab.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:#F8F8F8}
#header-right{display:flex;align-items:center;gap:12px}
#clock{color:#78D8A8;font-size:9px;font-family:'Press Start 2P','Courier New',monospace;letter-spacing:0.1em}
#data-badge{font-size:8px;padding:2px 6px;background:#202838;color:#78D8A8;border:1px solid #304848;font-family:'Press Start 2P','Courier New',monospace;letter-spacing:0.05em}
#data-badge.offline{background:#383020;color:#D8A828;border-color:#485030}
#data-badge.simulated{background:#282030;color:#A878E8;border-color:#483868}
#office-wrap{position:relative;width:100%;height:calc(100vh - 36px);overflow:hidden;background:#0A0A14;display:flex;align-items:center;justify-content:center}
#canvas{
  display:block;
  image-rendering:pixelated;
  image-rendering:crisp-edges;
  cursor:crosshair;
  max-width:100%;
  max-height:100%;
}
#cards-view{display:none;width:100%;height:calc(100vh - 36px);overflow-y:auto;background:#0A0A14;padding:16px}
#cards-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:1400px;margin:0 auto}
.card{background:#1A1A28;border:1px solid #303048;padding:10px;cursor:pointer;display:flex;gap:10px;align-items:flex-start;transition:background 0.1s,border-color 0.1s;min-height:100px}
.card:hover{background:#1E2030;border-color:#4A5870}
.card.selected{background:#1A2840;border:2px solid #4A90D9}
.card-avatar{flex-shrink:0;image-rendering:pixelated;image-rendering:crisp-edges}
.card-info{flex:1;min-width:0}
.card-name{font-size:8px;color:#F8F8F8;font-weight:bold;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:'Press Start 2P','Courier New',monospace;letter-spacing:0.05em}
.card-role{font-size:6px;color:#889090;margin-bottom:4px;font-family:'Press Start 2P','Courier New',monospace;letter-spacing:0.05em}
.card-status{font-size:7px;margin-bottom:4px;display:flex;align-items:center;gap:4px;font-family:'Press Start 2P','Courier New',monospace}
.card-task{font-size:6px;color:#A8A8B8;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;font-family:'Press Start 2P','Courier New',monospace;letter-spacing:0.03em}
.card-progress-wrap{background:#282830;height:5px;width:100%;margin-bottom:3px}
.card-progress-bar{height:5px;background:#40C060;transition:width 0.3s}
.card-ts{font-size:6px;color:#606070;font-family:'Press Start 2P','Courier New',monospace}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
#side-panel{position:fixed;right:-400px;top:36px;width:380px;height:calc(100vh - 36px);background:#0E0E1A;border-left:2px solid #252535;z-index:200;overflow-y:auto;transition:right 0.2s ease-out}
#side-panel.open{right:0}
#side-panel-header{background:#1A1A2A;padding:10px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #303048;position:sticky;top:0;z-index:10}
#side-panel-header h2{font-size:10px;color:#F8F8F8}
#side-close{background:none;border:none;color:#889090;cursor:pointer;font-size:18px;padding:4px 8px;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center}
#side-close:hover{color:#F8F8F8}
#side-content{padding:12px}
.side-avatar-wrap{text-align:center;margin-bottom:12px}
.side-avatar{image-rendering:pixelated;image-rendering:crisp-edges}
.side-name{font-size:11px;color:#F8F8F8;font-weight:bold;margin-bottom:2px;text-align:center}
.side-role{font-size:8px;color:#889090;text-align:center;margin-bottom:8px}
.side-section{margin-bottom:12px}
.side-section-title{font-size:7px;color:#4A90D9;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;border-bottom:1px solid #252535;padding-bottom:3px}
.side-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;font-size:8px}
.side-label{color:#606070}
.side-value{color:#A8A8B8}
.side-progress-wrap{background:#282830;height:6px;width:100%;margin-top:4px}
.side-progress-bar{height:6px;background:#40C060;transition:width 0.3s}
#tooltip{position:fixed;pointer-events:none;z-index:300;display:none;background:#101018;border:1px solid #404858;padding:8px 10px;min-width:160px;font-size:8px;color:#E8E8E8;box-shadow:1px 1px 0 #606878;font-family:'Press Start 2P','Courier New',monospace;letter-spacing:0.05em}
#tooltip .tt-name{font-size:8px;color:#F8F8F8;font-weight:bold;margin-bottom:3px}
#tooltip .tt-role{color:#889090;margin-bottom:3px;font-size:7px}
#tooltip .tt-task{color:#A8A8B8;margin-bottom:4px;font-size:7px}
#tooltip .tt-progress-wrap{background:#282830;height:5px;width:80px;display:inline-block}
#tooltip .tt-progress-bar{height:5px;background:#40C060;display:block}
@media (max-width:768px){
  #cards-grid{grid-template-columns:repeat(2,1fr)}
  #side-panel{right:auto !important;bottom:-100%;left:0;top:auto;width:100%;height:auto;max-height:70vh;border-left:none;border-top:2px solid #252535;border-radius:16px 16px 0 0;transition:bottom 0.3s ease-out;}
  #side-panel.open{bottom:0;right:auto !important}
  #side-content{padding:8px 12px 24px}
  #side-panel-header{padding:8px 12px}
}
</style>
</head>
<body>
<div id="header">
  <div id="tabs">
    <button class="tab active" data-tab="office">🏢 Office View</button>
    <button class="tab" data-tab="cards">👥 Agent Cards</button>
  </div>
  <div id="header-right">
    <span id="clock">00:00:00</span>
    <span id="data-badge">LOADING</span>
  </div>
</div>
<div id="office-wrap">
  <canvas id="canvas" width="480" height="320"></canvas>
</div>
<div id="cards-view"></div>
<div id="side-panel">
  <div id="side-panel-header">
    <h2 id="side-panel-title">Agent Detail</h2>
    <button id="side-close">✕</button>
  </div>
  <div id="side-content"></div>
</div>
<div id="tooltip">
  <div class="tt-name"></div>
  <div class="tt-role"></div>
  <div class="tt-task"></div>
  <div><span class="tt-progress-wrap"><span class="tt-progress-bar"></span></span> <span class="tt-pct"></span></div>
</div>

<script>
// ==================== CONSTANTS (v15: TILE=16, logical 480x320) ====================
const TILE = 16;
const COLS = 30;
const ROWS = 20;
const CANVAS_W = 480;
const CANVAS_H = 320;

// ==================== ROOMS ====================
// Top zone (rows 0-8): 3 rooms side by side
// Row 9: horizontal corridor
// Bottom zone (rows 10-19): Meeting A (left) + Meeting B (right, includes break area)
const ROOMS = [
  {id:'exec',    name:'Exec Suite',    col:0,  row:0, w:9,  h:9,  floorType:'wood'},
  {id:'tech',    name:'Tech Room',     col:10, row:0, w:9,  h:9,  floorType:'carpet_blue'},
  {id:'design',  name:'Design Studio', col:20, row:0, w:10, h:9,  floorType:'carpet_green'},
  {id:'meetA',   name:'Meeting A',     col:0,  row:10,w:14, h:10, floorType:'carpet_blue'},
  {id:'meetB',   name:'Meeting B',     col:15, row:10,w:15, h:10, floorType:'carpet_green'},
];

// ==================== WALKABLE SET ====================
const WALKABLE = new Set();
// Everything walkable except outer boundary
for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) WALKABLE.add(`${c},${r}`);
// Row 9 = horizontal corridor (already walkable)
// Col 9 and col 19 = vertical corridors in top zone (already walkable)
// Col 14 = vertical corridor in bottom zone (already walkable)

// ==================== AGENT LIST ====================
const AGENT_LIST = [
  // Exec Suite (cols 0-8, rows 0-8)
  {id:'jacques',  name:'Jacques',  role:'CEO',           dept:'exec',   desk:{col:2,row:2}, room:'exec',   hairColor:'#3A2005', shirtColor:'#1A1A1A'},
  {id:'trump',    name:'Trump',    role:'Assistant',     dept:'exec',   desk:{col:5,row:2}, room:'exec',   hairColor:'#D4A017', shirtColor:'#1A1A2E'},
  {id:'ops',      name:'Ops',      role:'COO',           dept:'exec',   desk:{col:2,row:5}, room:'exec',   hairColor:'#2A1808', shirtColor:'#E8C040'},
  {id:'growth',   name:'Growth',   role:'Head of Growth',dept:'exec',   desk:{col:5,row:5}, room:'exec',   hairColor:'#6A3A18', shirtColor:'#E8C040'},
  // Tech Room (cols 10-18, rows 0-8)
  {id:'frontend', name:'Frontend', role:'Sr. FE Eng',    dept:'tech',   desk:{col:11,row:1},room:'tech',   hairColor:'#303030', shirtColor:'#2A4A8C'},
  {id:'backend',  name:'Backend',  role:'Sr. BE Eng',    dept:'tech',   desk:{col:13,row:1},room:'tech',   hairColor:'#1A1A1A', shirtColor:'#2A4A8C'},
  {id:'devops',   name:'DevOps',   role:'DevOps Eng',    dept:'tech',   desk:{col:15,row:1},room:'tech',   hairColor:'#4A2810', shirtColor:'#2A4A8C'},
  {id:'data',     name:'Data',     role:'Data Eng',      dept:'tech',   desk:{col:17,row:1},room:'tech',   hairColor:'#1A1A1A', shirtColor:'#2A4A8C'},
  {id:'security', name:'Security', role:'Sec Eng',       dept:'tech',   desk:{col:11,row:4},room:'tech',   hairColor:'#2A1808', shirtColor:'#1A2A4A'},
  {id:'arch',     name:'Architect',role:'Tech Arch',     dept:'tech',   desk:{col:13,row:4},room:'tech',   hairColor:'#888880', shirtColor:'#2A4A8C'},
  {id:'research', name:'Research', role:'Researcher',    dept:'tech',   desk:{col:15,row:4},room:'tech',   hairColor:'#5A3010', shirtColor:'#2A4A8C'},
  {id:'analytics',name:'Analytics',role:'Data Analyst',  dept:'tech',   desk:{col:17,row:4},room:'tech',   hairColor:'#1A1818', shirtColor:'#2A4A8C'},
  // Design Studio (cols 20-29, rows 0-8)
  {id:'designer', name:'Designer', role:'Design Director',dept:'design', desk:{col:21,row:1},room:'design', hairColor:'#1A1010', shirtColor:'#2A7A3A'},
  {id:'uiux',     name:'UIUX',     role:'UI/UX Designer',dept:'design',  desk:{col:24,row:1},room:'design', hairColor:'#281838', shirtColor:'#2A7A3A'},
  {id:'content',  name:'Content',  role:'Content Writer', dept:'design',  desk:{col:21,row:4},room:'design', hairColor:'#A07040', shirtColor:'#2A7A3A'},
  {id:'cs',       name:'CS',       role:'CS Lead',        dept:'design',  desk:{col:24,row:4},room:'design', hairColor:'#E8B828', shirtColor:'#2A7A3A'},
  {id:'pm',       name:'PM',       role:'Product Mgr',    dept:'design',  desk:{col:27,row:2},room:'design', hairColor:'#5A3010', shirtColor:'#308898'},
  {id:'product',  name:'Product',  role:'Product Lead',   dept:'design',  desk:{col:27,row:5},room:'design', hairColor:'#2A1808', shirtColor:'#308898'},
  // Meeting Room A (cols 0-13, rows 10-19)
  {id:'marketing',name:'Marketing',role:'Marketing Lead', dept:'meetA',   desk:{col:3,row:12},room:'meetA',  hairColor:'#8A3010', shirtColor:'#308898'},
  {id:'sales',    name:'Sales',    role:'Sales Lead',     dept:'meetA',   desk:{col:7,row:12},room:'meetA',  hairColor:'#3A1E08', shirtColor:'#308898'},
  // Meeting Room B (cols 15-29, rows 10-19)
  {id:'qa',       name:'QA',       role:'QA Engineer',    dept:'meetB',   desk:{col:17,row:12},room:'meetB', hairColor:'#1A1818', shirtColor:'#6848A8'},
  {id:'tester',   name:'Tester',   role:'Test Engineer',  dept:'meetB',   desk:{col:21,row:12},room:'meetB', hairColor:'#4A2810', shirtColor:'#6848A8'},
];

const DEPT_COLORS = {exec:'#F0C060',tech:'#78B8F8',design:'#78D878',meetA:'#50C8D8',meetB:'#A878E8'};

// ==================== AGENT STATE ====================
const agentState = {};
AGENT_LIST.forEach((a, idx) => {
  agentState[a.id] = {
    status:'idle', task:'', progress:0, blocked_by:null,
    collaborating_with:null, priority:null, last_updated:'',
    currentTile:{...a.desk},
    targetTile:{...a.desk},
    path:[],
    facing:'south',
    walkFrame:0,
    idleTimer:0,
    animPhase:(idx * 1.618033) % (Math.PI * 2),
    atHome:true,
    fidgetTimer:0,
  };
});

// ==================== MEETING SEATS ====================
const MEET_A_SEATS = [
  {col:4,row:11},{col:6,row:11},{col:8,row:11},{col:10,row:11},
  {col:4,row:14},{col:6,row:14},{col:8,row:14},{col:10,row:14},
];
const MEET_B_SEATS = [
  {col:17,row:11},{col:19,row:11},{col:21,row:11},{col:23,row:11},
  {col:17,row:14},{col:19,row:14},{col:21,row:14},{col:23,row:14},
];
const COFFEE_TILE = {col:22, row:16};

const MEETING_PAIRS = [
  ['pm','frontend','A'],['pm','backend','A'],['pm','designer','B'],['pm','uiux','B'],
  ['frontend','uiux','A'],['frontend','qa','B'],['backend','frontend','A'],
  ['backend','data','A'],['arch','frontend','A'],['arch','backend','A'],
  ['designer','uiux','B'],['qa','tester','B'],['marketing','sales','B'],
  ['analytics','pm','A'],['trump','jacques','A'],['ops','growth','B'],
  ['devops','backend','A'],['research','product','B'],
  ['product','pm','A'],['cs','marketing','B'],['content','marketing','B'],
];

// ==================== PATHFINDING ====================
function findPath(from, to) {
  const startKey = `${from.col},${from.row}`;
  const endKey = `${to.col},${to.row}`;
  if (startKey === endKey) return [];
  const queue = [[from, []]];
  const visited = new Set([startKey]);
  const dirs = [{dc:0,dr:-1},{dc:0,dr:1},{dc:-1,dr:0},{dc:1,dr:0}];
  while (queue.length > 0) {
    const [cur, path] = queue.shift();
    for (const {dc,dr} of dirs) {
      const nc = cur.col+dc, nr = cur.row+dr;
      const key = `${nc},${nr}`;
      if (nc<0||nc>=COLS||nr<0||nr>=ROWS) continue;
      if (!WALKABLE.has(key)) continue;
      if (visited.has(key)) continue;
      visited.add(key);
      const newPath = [...path, {col:nc,row:nr}];
      if (key === endKey) return newPath;
      queue.push([{col:nc,row:nr}, newPath]);
    }
  }
  return [];
}

function getFacing(from, to) {
  if (!to) return 'south';
  const dc = to.col - from.col;
  const dr = to.row - from.row;
  if (Math.abs(dc) >= Math.abs(dr)) return dc > 0 ? 'east' : 'west';
  return dr > 0 ? 'south' : 'north';
}

// ==================== WALK SYSTEM ====================
let walkTick = 0;
function doWalkTick() {
  walkTick++;
  AGENT_LIST.forEach(agent => {
    const st = agentState[agent.id];
    if (st.path.length > 0) {
      const next = st.path.shift();
      st.facing = getFacing(st.currentTile, next);
      st.currentTile = next;
      st.walkFrame = (st.walkFrame + 1) % 4;
      if (st.path.length === 0) {
        const cur = st.currentTile;
        st.atHome = (cur.col === agent.desk.col && cur.row === agent.desk.row);
        if (st.atHome) st.facing = 'south';
      }
    } else {
      st.walkFrame = 0;
      if (st.status === 'idle') {
        st.fidgetTimer = (st.fidgetTimer || 0) + 1;
        if (st.fidgetTimer > 50 + (agent.id.charCodeAt(0) % 20)) {
          st.fidgetTimer = 0;
          if (st.atHome) {
            const dx = (Math.floor(walkTick * 0.7 + agent.desk.col) % 3) - 1;
            const dy = (Math.floor(walkTick * 0.5 + agent.desk.row) % 3) - 1;
            const ft = {col: agent.desk.col + dx, row: agent.desk.row + dy};
            const fk = `${ft.col},${ft.row}`;
            if (ft.col>=0&&ft.col<COLS&&ft.row>=0&&ft.row<ROWS&&WALKABLE.has(fk)) {
              walkTo(agent.id, ft);
              setTimeout(() => walkHome(agent.id), 2000 + (agent.id.charCodeAt(0) % 1000));
            }
          }
        }
      }
      if (st.status === 'blocked' || st.status === 'error') {
        st.fidgetTimer = (st.fidgetTimer || 0) + 1;
        if (st.fidgetTimer > 8) {
          st.fidgetTimer = 0;
          const paceDir = (Math.floor(walkTick / 8) % 2 === 0) ? 1 : -1;
          const pt = {col: agent.desk.col + paceDir, row: agent.desk.row};
          const pk = `${pt.col},${pt.row}`;
          if (pt.col>=0&&pt.col<COLS&&WALKABLE.has(pk)) walkTo(agent.id, pt);
        }
      }
    }
  });
}

function walkTo(agentId, targetTile) {
  const st = agentState[agentId];
  const tKey = `${targetTile.col},${targetTile.row}`;
  const cKey = `${st.currentTile.col},${st.currentTile.row}`;
  if (tKey === cKey) return;
  st.targetTile = {...targetTile};
  st.path = findPath(st.currentTile, targetTile);
}

function walkHome(agentId) {
  const agent = AGENT_LIST.find(a => a.id === agentId);
  if (agent) walkTo(agentId, agent.desk);
}

// ==================== STATUS APPLICATION ====================
function applyStatus(agentId, status, task, progress, blockedBy, collabWith, priority) {
  const st = agentState[agentId];
  const agent = AGENT_LIST.find(a => a.id === agentId);
  const prevStatus = st.status;
  st.status = status;
  st.task = task || '';
  st.progress = progress || 0;
  st.blocked_by = blockedBy || null;
  st.collaborating_with = collabWith || null;
  st.priority = priority || null;

  if (status === 'coffee_break') {
    walkTo(agentId, COFFEE_TILE);
  } else if (status === 'working' || status === 'idle') {
    const cur = st.currentTile;
    if (cur.col !== agent.desk.col || cur.row !== agent.desk.row) walkHome(agentId);
    else st.path = [];
  } else if (prevStatus === 'coffee_break' && status !== 'coffee_break') {
    walkHome(agentId);
  }
}

// ==================== MEETING TRIGGERS ====================
const meetingState = {};
function processMeetings(queueData) {
  if (!queueData) return;
  const meetAOccupied = [];
  const meetBOccupied = [];
  MEETING_PAIRS.forEach(([a1, a2, room]) => {
    const s1 = agentState[a1]; const s2 = agentState[a2];
    if (!s1 || !s2) return;
    const collab = (s1.collaborating_with === a2 || s2.collaborating_with === a1) &&
                   (s1.status === 'in_meeting' || s1.status === 'reviewing' ||
                    s2.status === 'in_meeting' || s2.status === 'reviewing');
    if (meetingState[a1] && meetingState[a2]) return;
    if (!collab) {
      if (meetingState[a1]) delete meetingState[a1];
      if (meetingState[a2]) delete meetingState[a2];
      return;
    }
    const seats = room === 'A' ? MEET_A_SEATS : MEET_B_SEATS;
    const occupied = room === 'A' ? meetAOccupied : meetBOccupied;
    if (occupied.length + 2 > seats.length) return;
    const seat1 = seats[occupied.length];
    const seat2 = seats[occupied.length + 1];
    occupied.push(a1, a2);
    meetingState[a1] = {roomId:room}; meetingState[a2] = {roomId:room};
    walkTo(a1, seat1); walkTo(a2, seat2);
  });
}

// ==================== DATA FETCHING ====================
let lastGoodData = null;
let dataSource = 'SIMULATED';
async function fetchQueue() {
  try {
    const resp = await fetch('/data/work-queue.json', {cache:'no-store'});
    if (!resp.ok) throw new Error('non-ok');
    const data = await resp.json();
    lastGoodData = data; dataSource = 'LIVE';
    updateBadge('LIVE', false); applyQueueData(data);
  } catch(e) {
    if (lastGoodData) { dataSource = 'CACHED'; updateBadge('CACHED', true); }
    else { dataSource = 'SIMULATED'; updateBadge('SIM', false, true); }
  }
}
function updateBadge(text, offline, sim) {
  const el = document.getElementById('data-badge');
  el.textContent = text;
  el.className = offline ? 'offline' : (sim ? 'simulated' : '');
}
function applyQueueData(data) {
  const entries = Array.isArray(data) ? data : (data.queue || []);
  AGENT_LIST.forEach(a => applyStatus(a.id, 'idle', '', 0, null, null, 'normal'));
  const byAgent = {};
  entries.forEach(entry => {
    const id = entry.assignee || entry.agent;
    if (!id) return;
    byAgent[id] = entry;
  });
  Object.entries(byAgent).forEach(([id, entry]) => {
    const agent = AGENT_LIST.find(a => a.id === id || a.name === id);
    if (!agent) return;
    // v15 STATUS MAP FIX: running→working, done→idle, failed→blocked
    let status = entry.status || 'idle';
    const statusMap = {
      'running': 'working',
      'in_progress': 'working',
      'done': 'idle',
      'failed': 'blocked',
      'pending': 'waiting',
      'idle': 'idle',
      'blocked': 'blocked',
      'working': 'working',
      'waiting': 'waiting',
      'coffee_break': 'coffee_break',
      'in_meeting': 'in_meeting',
      'reviewing': 'reviewing',
      'thinking': 'thinking',
    };
    status = statusMap[status] || status;
    const task = entry.payload?.title || entry.payload?.task || entry.payload?.project || entry.type || '';
    applyStatus(agent.id, status, task, entry.progress||0,
      entry.blocked_by, entry.collaborating_with, entry.priority||'normal');
    agentState[agent.id].last_updated = entry.completed_at || entry.started_at || entry.created_at || '';
  });
  processMeetings(entries);
  if (currentTab === 'cards') updateCards();
}

// ==================== PIXEL ART DRAW FUNCTIONS ====================

function drawFloorTile(ctx2, x, y, type) {
  switch(type) {
    case 'wood':
      ctx2.fillStyle = '#C8904A';
      ctx2.fillRect(x, y, TILE, TILE);
      ctx2.fillStyle = '#A87030';
      ctx2.fillRect(x, y+7, TILE, 1);
      ctx2.fillStyle = '#986820';
      ctx2.fillRect(x+3, y+3, 2, 2);
      break;
    case 'carpet_blue':
      ctx2.fillStyle = '#1A3A7A';
      ctx2.fillRect(x, y, TILE, TILE);
      ctx2.fillStyle = '#1E4282';
      ctx2.fillRect(x+4, y+4, 1, 1);
      ctx2.fillRect(x+12, y+12, 1, 1);
      break;
    case 'carpet_green':
      ctx2.fillStyle = '#2A5A2A';
      ctx2.fillRect(x, y, TILE, TILE);
      ctx2.fillStyle = '#2E6430';
      ctx2.fillRect(x+6, y+2, 1, 1);
      ctx2.fillRect(x+2, y+10, 1, 1);
      break;
    case 'corridor':
      ctx2.fillStyle = '#505050';
      ctx2.fillRect(x, y, TILE, TILE);
      ctx2.fillStyle = '#484848';
      ctx2.fillRect(x, y, TILE, 1);
      ctx2.fillRect(x, y, 1, TILE);
      break;
    default:
      ctx2.fillStyle = '#404040';
      ctx2.fillRect(x, y, TILE, TILE);
  }
}

function drawSprite(ctx2, x, y, agent, frame) {
  const hairColor = agent.hairColor || '#3A2005';
  const shirtColor = agent.shirtColor || '#2A4A8C';
  const skinColor = '#E8C090';

  // Hair (3px tall, 8px wide centered)
  ctx2.fillStyle = hairColor;
  ctx2.fillRect(x+4, y, 8, 3);
  // Head (8x6px)
  ctx2.fillStyle = skinColor;
  ctx2.fillRect(x+4, y+2, 8, 6);
  // Eyes (1px each)
  ctx2.fillStyle = '#1A0A00';
  ctx2.fillRect(x+6, y+4, 1, 1);
  ctx2.fillRect(x+9, y+4, 1, 1);
  // Body/shirt (10px wide, 8px tall)
  ctx2.fillStyle = shirtColor;
  ctx2.fillRect(x+3, y+8, 10, 8);
  // Arms
  ctx2.fillRect(x+1, y+8, 2, 6);
  ctx2.fillRect(x+13, y+8, 2, 6);
  // Hands skin
  ctx2.fillStyle = skinColor;
  ctx2.fillRect(x+1, y+13, 2, 2);
  ctx2.fillRect(x+13, y+13, 2, 2);
  // Pants
  ctx2.fillStyle = '#1A2A3A';
  ctx2.fillRect(x+3, y+16, 10, 5);
  // Legs with walk animation
  if (frame % 2 === 0) {
    ctx2.fillRect(x+3, y+21, 4, 3);
    ctx2.fillRect(x+9, y+21, 4, 3);
  } else {
    ctx2.fillRect(x+4, y+21, 3, 3);
    ctx2.fillRect(x+8, y+21, 4, 3);
  }
  // Shoes
  ctx2.fillStyle = '#0A0A0A';
  ctx2.fillRect(x+3, y+21, 4, 3);
  ctx2.fillRect(x+9, y+21, 4, 3);
}

function drawStatusDot(ctx2, cx, headY, status) {
  const colors = {
    working:'#00C040', idle:'#808080', blocked:'#F04020',
    waiting:'#F0A020', coffee_break:'#C08040', done:'#4080FF',
    in_meeting:'#4888D8', reviewing:'#9848C8', thinking:'#F0A020',
    error:'#E02020'
  };
  const color = colors[status] || '#808080';
  ctx2.fillStyle = color;
  ctx2.fillRect(cx-1, headY-4, 3, 3);
  ctx2.strokeStyle = '#FFFFFF';
  ctx2.lineWidth = 0.5;
  ctx2.strokeRect(cx-1.5, headY-4.5, 4, 4);
  ctx2.lineWidth = 1;
}

function drawNameLabel(ctx2, cx, footY, name) {
  ctx2.font = '5px monospace';
  ctx2.textAlign = 'center';
  ctx2.fillStyle = 'rgba(0,0,0,0.8)';
  ctx2.fillText(name, cx+1, footY+9);
  ctx2.fillStyle = '#FFFFFF';
  ctx2.fillText(name, cx, footY+8);
}

function drawDesk(ctx2, x, y, hasMonitor) {
  const dx = x+1, dy = y+6;
  ctx2.fillStyle = '#A07820';
  ctx2.fillRect(dx, dy, 14, 8);
  ctx2.fillStyle = '#705010';
  ctx2.fillRect(dx, dy+7, 14, 2);
  ctx2.fillStyle = '#C09830';
  ctx2.fillRect(dx, dy, 14, 2);
  if (hasMonitor) {
    ctx2.fillStyle = '#0A0A1A';
    ctx2.fillRect(dx+4, dy-5, 6, 5);
    ctx2.fillStyle = '#2A60C0';
    ctx2.fillRect(dx+5, dy-4, 4, 3);
    ctx2.fillStyle = '#60A0F0';
    ctx2.fillRect(dx+5, dy-4, 1, 1);
  }
}

function drawDoor(ctx2, col, row) {
  const x = col*TILE, y = row*TILE;
  ctx2.fillStyle = '#1A0A00';
  ctx2.fillRect(x, y, TILE*2, TILE);
  ctx2.fillStyle = '#5A3A10';
  ctx2.fillRect(x, y-2, TILE*2, 3);
  ctx2.fillStyle = '#3A2005';
  ctx2.fillRect(x-1, y-2, 2, TILE+2);
  ctx2.fillRect(x+TILE*2-1, y-2, 2, TILE+2);
  ctx2.fillStyle = '#D4B04A';
  ctx2.fillRect(x+TILE-2, y+TILE/2, 2, 2);
}

// ==================== CANVAS SETUP ====================
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

// ==================== FLOOR DRAWING ====================
function drawFloor() {
  // Background
  ctx.fillStyle = '#2A2A3A';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  // Draw room floors
  ROOMS.forEach(room => {
    for(let r = room.row; r < room.row + room.h; r++) {
      for(let c = room.col; c < room.col + room.w; c++) {
        drawFloorTile(ctx, c*TILE, r*TILE, room.floorType);
      }
    }
  });

  // Corridor row 9 (horizontal) and vertical connectors
  for(let c = 0; c < COLS; c++) drawFloorTile(ctx, c*TILE, 9*TILE, 'corridor');
  // Vertical corridors in top zone: col 9, col 19
  for(let r = 0; r < 9; r++) {
    drawFloorTile(ctx, 9*TILE, r*TILE, 'corridor');
    drawFloorTile(ctx, 19*TILE, r*TILE, 'corridor');
  }
  // Vertical corridor between meeting rooms: col 14
  for(let r = 10; r < ROWS; r++) drawFloorTile(ctx, 14*TILE, r*TILE, 'corridor');

  // Room wall tops (north wall of each room = dark strip at top)
  ROOMS.forEach(room => {
    ctx.fillStyle = '#3A2808';
    ctx.fillRect(room.col*TILE, room.row*TILE, room.w*TILE, 3);
    ctx.fillStyle = '#5A3A10';
    ctx.fillRect(room.col*TILE, room.row*TILE, room.w*TILE, 1);
  });

  // Room name labels
  ctx.font = '5px "Press Start 2P","Courier New",monospace';
  ctx.textAlign = 'center';
  ROOMS.forEach(room => {
    const lx = (room.col + room.w/2) * TILE;
    const ly = room.row * TILE + 12;
    const tw = ctx.measureText(room.name).width;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(lx - tw/2 - 2, ly - 6, tw + 4, 8);
    ctx.fillStyle = 'rgba(255,255,255,0.65)';
    ctx.fillText(room.name, lx, ly);
  });
  ctx.textAlign = 'left';

  // Doors: at room boundaries opening onto corridors
  // Top rooms → corridor row 9: simple door mark at south wall
  // Exec: col 3-4, row 8 (door to row 9)
  ctx.fillStyle = '#1A0A00';
  ctx.fillRect(3*TILE, 8*TILE+12, 2*TILE, 4);
  ctx.fillRect(13*TILE, 8*TILE+12, 2*TILE, 4);
  ctx.fillRect(23*TILE, 8*TILE+12, 2*TILE, 4);
  // Bottom rooms → corridor row 9
  ctx.fillStyle = '#1A0A00';
  ctx.fillRect(5*TILE, 9*TILE+12, 2*TILE, 4);
  ctx.fillRect(18*TILE, 9*TILE+12, 2*TILE, 4);
}

// ==================== FURNITURE DRAWING ====================
let animTick = 0;
setInterval(() => { animTick++; }, 50);

function drawFurniture() {
  // Desks for all agents
  AGENT_LIST.forEach(agent => {
    drawDesk(ctx, agent.desk.col*TILE, agent.desk.row*TILE, true);
  });

  // Meeting tables
  // Meeting Room A table (cols 4-9, row 12 area)
  ctx.fillStyle = '#6A4010';
  ctx.fillRect(4*TILE+2, 11*TILE+6, 8*TILE-4, 3*TILE-4);
  ctx.fillStyle = '#A07820';
  ctx.fillRect(4*TILE+4, 11*TILE+8, 8*TILE-8, 3*TILE-8);
  ctx.fillStyle = '#C09830';
  ctx.fillRect(4*TILE+4, 11*TILE+8, 8*TILE-8, 2);
  // Meeting Room B table
  ctx.fillStyle = '#1A4A1A';
  ctx.fillRect(17*TILE+2, 11*TILE+6, 8*TILE-4, 3*TILE-4);
  ctx.fillStyle = '#2A6A2A';
  ctx.fillRect(17*TILE+4, 11*TILE+8, 8*TILE-8, 3*TILE-8);
  ctx.fillStyle = '#3A8A3A';
  ctx.fillRect(17*TILE+4, 11*TILE+8, 8*TILE-8, 2);

  // Break area in Meeting B (cols 20-29, rows 14-19)
  ctx.fillStyle = '#3A1A0A';
  ctx.fillRect(20*TILE, 14*TILE, 10*TILE, 6*TILE);
  ctx.fillStyle = '#2A5A2A';
  ctx.fillRect(20*TILE, 14*TILE, 10*TILE, 1);

  // Sofa
  ctx.fillStyle = '#7A4A88';
  ctx.fillRect(21*TILE, 15*TILE+2, 4*TILE, TILE-4);
  ctx.fillStyle = '#9068A8';
  ctx.fillRect(21*TILE+2, 15*TILE+4, 4*TILE-4, TILE-8);

  // Coffee machine (pixel art, no arc except steam)
  const cmX = 22*TILE+2, cmY = 16*TILE+2;
  ctx.fillStyle = '#3D2B1F';
  ctx.fillRect(cmX, cmY, 12, 14);
  ctx.fillStyle = '#5A3A28';
  ctx.fillRect(cmX+2, cmY+2, 8, 8);
  ctx.fillStyle = '#E84040';
  ctx.fillRect(cmX+4, cmY+4, 4, 4);
  ctx.fillStyle = '#FF6060';
  ctx.fillRect(cmX+5, cmY+5, 2, 2);
  ctx.fillStyle = '#2A1A0E';
  ctx.fillRect(cmX+3, cmY-3, 6, 3);
  ctx.fillStyle = '#281A0E';
  ctx.fillRect(cmX+1, cmY+12, 10, 3);
  // Steam dots (animated arcs OK for coffee steam per spec)
  [0, Math.PI*0.66, Math.PI*1.33].forEach((phase, i) => {
    const drift = (animTick * 0.3 + phase * 3) % 8;
    const alpha = 0.3 + 0.3 * Math.sin(animTick * 0.1 + phase);
    ctx.fillStyle = `rgba(220,220,220,${alpha})`;
    ctx.beginPath();
    ctx.arc(cmX+2+i*4, cmY-3-drift, 1.5, 0, Math.PI*2);
    ctx.fill();
  });

  // Small plant in exec suite
  ctx.fillStyle = '#B06840';
  ctx.fillRect(7*TILE+4, 7*TILE+6, 6, 8);
  ctx.fillStyle = '#58A840';
  ctx.fillRect(6*TILE+2, 7*TILE+2, 8, 6);

  // Bookshelf in design studio
  ctx.fillStyle = '#705030';
  ctx.fillRect(20*TILE, 0, 2, 8*TILE);
  ['#D04040','#E8C040','#4068B0','#40A050','#F87840'].forEach((c,i)=>{
    ctx.fillStyle=c; ctx.fillRect(20*TILE, i*TILE+2, 2, TILE-4);
  });

  // Server rack in tech room
  ctx.fillStyle = '#1A1A2A';
  ctx.fillRect(18*TILE+2, 7*TILE, TILE-4, 2*TILE);
  for(let i=0;i<4;i++){
    ctx.fillStyle='#2A2A3A'; ctx.fillRect(18*TILE+4,7*TILE+3+i*8,TILE-8,6);
    ctx.fillStyle=(i%2===0)?'#00FF88':'#0088FF';
    ctx.fillRect(18*TILE+TILE-8,7*TILE+5+i*8,3,3);
  }
}

// ==================== SPRITE CACHE ====================
function spriteForAgent(agent, frame) {
  const oc = document.createElement('canvas');
  oc.width = 16; oc.height = 24;
  const ctx2 = oc.getContext('2d');
  ctx2.imageSmoothingEnabled = false;
  drawSprite(ctx2, 0, 0, agent, frame);
  return oc;
}
const spriteCache = {};
function getSprite(agentId, frame) {
  const key = `${agentId}_${frame%2}`;
  if (!spriteCache[key]) {
    const agent = AGENT_LIST.find(a => a.id === agentId);
    spriteCache[key] = spriteForAgent(agent, frame);
  }
  return spriteCache[key];
}

// ==================== STATUS COLORS ====================
const STATUS_COLORS = {
  idle:'#909090', working:'#40C860', blocked:'#E04040',
  in_meeting:'#4888D8', reviewing:'#9848C8', coffee_break:'#C08040',
  done:'#4080FF', error:'#E02020', waiting:'#F0A020', thinking:'#F0A020',
  default:'#909090'
};

// ==================== RENDER LOOP ====================
let animFrame = null;

function render(timestamp) {
  try {
    ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
    drawFloor();
    drawAgents(timestamp);
    drawFurniture();
  } catch(e) {
    console.error('[render]', e);
  }
  animFrame = requestAnimationFrame(render);
}

function drawAgents(timestamp) {
  const sorted = [...AGENT_LIST].sort((a,b) =>
    agentState[a.id].currentTile.row - agentState[b.id].currentTile.row
  );
  sorted.forEach(agent => {
    const st = agentState[agent.id];
    const tileX = st.currentTile.col * TILE;
    const tileY = st.currentTile.row * TILE;
    // sprite 16x24, center in tile horizontally, align bottom to tile bottom
    const spriteX = tileX + (TILE - 16) / 2;
    const spriteY = tileY - 24 + TILE;

    let frame = 0;
    if (st.path.length > 0) frame = Math.floor(timestamp / 150) % 4;
    else if (st.status === 'working') frame = Math.floor(timestamp / 800) % 2;

    const bob = (st.status === 'idle') ? Math.round(Math.sin(timestamp/2000 + st.animPhase) * 0.5) : 0;

    const sp = getSprite(agent.id, frame);
    ctx.drawImage(sp, spriteX, spriteY + bob, 16, 24);

    // Status dot (3x3px) above head
    const headCX = spriteX + 8;
    const headY = spriteY + bob;
    drawStatusDot(ctx, headCX, headY, st.status);

    // Name label (5px font) below feet
    const footY = spriteY + 24 + bob;
    drawNameLabel(ctx, headCX, footY, agent.name);

    // Collaboration line
    if (st.collaborating_with) {
      const other = AGENT_LIST.find(a => a.id === st.collaborating_with || a.name === st.collaborating_with);
      if (other) {
        const ost = agentState[other.id];
        ctx.save(); ctx.setLineDash([2,3]);
        ctx.strokeStyle = 'rgba(74,144,217,0.5)'; ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(tileX+TILE/2, tileY+TILE/2);
        ctx.lineTo(ost.currentTile.col*TILE+TILE/2, ost.currentTile.row*TILE+TILE/2);
        ctx.stroke(); ctx.restore();
      }
    }
    // Blocked line
    if (st.blocked_by) {
      const other = AGENT_LIST.find(a => a.id === st.blocked_by || a.name === st.blocked_by);
      if (other) {
        const ost = agentState[other.id];
        ctx.save(); ctx.setLineDash([2,3]);
        ctx.strokeStyle = 'rgba(224,64,64,0.5)'; ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(tileX+TILE/2, tileY+TILE/2);
        ctx.lineTo(ost.currentTile.col*TILE+TILE/2, ost.currentTile.row*TILE+TILE/2);
        ctx.stroke(); ctx.restore();
      }
    }
  });
}

// ==================== CANVAS CLICK ====================
const tooltip = document.getElementById('tooltip');
canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = CANVAS_W / rect.width;
  const scaleY = CANVAS_H / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;
  const tileCol = Math.floor(mx / TILE), tileRow = Math.floor(my / TILE);
  const clicked = AGENT_LIST.find(a => {
    const st = agentState[a.id];
    return st.currentTile.col === tileCol && st.currentTile.row === tileRow;
  });
  if (clicked) {
    showTooltip(e.clientX, e.clientY, clicked);
    openSidePanel(clicked.id);
  } else {
    tooltip.style.display = 'none';
  }
});
document.addEventListener('click', e => {
  if (!canvas.contains(e.target) && !tooltip.contains(e.target)) tooltip.style.display = 'none';
});

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showTooltip(cx, cy, agent) {
  const st = agentState[agent.id];
  tooltip.querySelector('.tt-name').textContent = agent.name;
  tooltip.querySelector('.tt-role').textContent = agent.role;
  tooltip.querySelector('.tt-task').textContent = st.task ? `Task: ${st.task.substring(0,40)}` : 'No active task';
  tooltip.querySelector('.tt-progress-bar').style.width = `${st.progress||0}%`;
  const pc = (st.progress||0)<34?'#E04848':(st.progress||0)<67?'#E0B828':'#40C060';
  tooltip.querySelector('.tt-progress-bar').style.background = pc;
  tooltip.querySelector('.tt-pct').textContent = `${st.progress||0}%`;
  const tipW=180,tipH=80;
  let tx=cx+12,ty=cy-20;
  if(tx+tipW>window.innerWidth) tx=cx-tipW-12;
  if(ty+tipH>window.innerHeight) ty=cy-tipH;
  tooltip.style.left=tx+'px'; tooltip.style.top=ty+'px'; tooltip.style.display='block';
}

      <div class="card-role">${escHtml(agent.role)}</div>
      <div class="card-status"><span class="status-dot" style="background:${sColor}"></span><span style="color:${sColor};font-size:7px">${escHtml(st.status||'idle')}</span></div>
      <div class="card-task">${escHtml(st.task||'No active task')}</div>
      <div class="card-progress-wrap"><div class="card-progress-bar" style="width:${st.progress||0}%;background:${progColor}"></div></div>
      <div class="card-ts">${st.last_updated?new Date(st.last_updated).toLocaleString():'No data'}</div>
    `;
    card.appendChild(ac); card.appendChild(info);
    card.addEventListener('click',()=>{
      document.querySelectorAll('.card').forEach(c=>c.classList.remove('selected'));
      card.classList.add('selected'); openSidePanel(agent.id);
    });
    grid.appendChild(card);
  });
}

function updateCards() {
  AGENT_LIST.forEach(agent => {
    const st = agentState[agent.id];
    const card = document.querySelector(`.card[data-agent-id="${agent.id}"]`);
    if (!card) return;
    const sColor=STATUS_COLORS[st.status]||'#909090';
    const progColor=(st.progress||0)<34?'#E04848':(st.progress||0)<67?'#E0B828':'#40C060';
    const dot=card.querySelector('.status-dot');
    const stLabel=card.querySelector('.card-status span:last-child');
    const task=card.querySelector('.card-task');
    const bar=card.querySelector('.card-progress-bar');
    const ts=card.querySelector('.card-ts');
    if(dot) dot.style.background=sColor;
    if(stLabel){stLabel.style.color=sColor;stLabel.textContent=st.status||'idle';}
    if(task) task.textContent=st.task||'No active task';
    if(bar){bar.style.width=`${st.progress||0}%`;bar.style.background=progColor;}
    if(ts) ts.textContent=st.last_updated?new Date(st.last_updated).toLocaleString():'No data';
    const ac=card.querySelector('canvas');
    if(ac){
      const acc=ac.getContext('2d'); acc.clearRect(0,0,48,72); acc.imageSmoothingEnabled=false;
      acc.drawImage(getSprite(agent.id,0),0,0,16,24,0,0,48,72);
    }
  });
}

// ==================== TAB SWITCHING ====================
let currentTab = 'office';
document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    const tab = btn.dataset.tab;
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (tab === 'office') {
      document.getElementById('office-wrap').style.display = 'flex';
      document.getElementById('cards-view').style.display = 'none';
      currentTab = 'office';
      if (!animFrame) animFrame = requestAnimationFrame(render);
    } else {
      document.getElementById('office-wrap').style.display = 'none';
      document.getElementById('cards-view').style.display = 'block';
      currentTab = 'cards'; buildCards();
    }
  });
});

// ==================== CANVAS SCALING ====================
function applyScale() {
  const wrap = document.getElementById('office-wrap');
  const containerW = wrap.clientWidth || window.innerWidth;
  const containerH = wrap.clientHeight || (window.innerHeight - 36);
  const scale = Math.min(containerW / CANVAS_W, containerH / CANVAS_H);
  canvas.style.width = Math.round(CANVAS_W * scale) + 'px';
  canvas.style.height = Math.round(CANVAS_H * scale) + 'px';
}
window.addEventListener('resize', applyScale);

// ==================== CLOCK ====================
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
}
setInterval(updateClock, 1000);
updateClock();

// ==================== WALK TICK ====================
const AGENT_SCRIPTS = {
  jacques:   ['working','working','working','working','thinking','working','working','working'],
  trump:     ['working','working','in_meeting','working','working','thinking','working','coffee_break'],
  ops:       ['working','working','coffee_break','working','working','idle','working','working'],
  growth:    ['working','thinking','working','working','coffee_break','working','working','idle'],
  frontend:  ['working','working','working','coffee_break','working','blocked','working','working'],
  backend:   ['working','working','blocked','working','working','thinking','working','coffee_break'],
  devops:    ['working','working','working','thinking','working','working','coffee_break','working'],
  data:      ['working','working','thinking','working','idle','working','working','working'],
  security:  ['working','thinking','working','working','working','coffee_break','working','blocked'],
  arch:      ['working','working','working','in_meeting','working','working','thinking','working'],
  research:  ['working','thinking','working','working','coffee_break','working','working','idle'],
  analytics: ['working','working','working','thinking','working','coffee_break','blocked','working'],
  pm:        ['working','working','working','in_meeting','thinking','working','working','coffee_break'],
  product:   ['working','working','thinking','working','working','in_meeting','working','coffee_break'],
  marketing: ['working','coffee_break','working','working','thinking','working','working','idle'],
  sales:     ['working','working','working','coffee_break','blocked','working','thinking','working'],
  designer:  ['working','working','thinking','working','working','coffee_break','working','idle'],
  uiux:      ['working','working','working','thinking','in_meeting','working','coffee_break','working'],
  content:   ['working','thinking','working','working','coffee_break','working','idle','working'],
  cs:        ['working','working','coffee_break','blocked','working','working','thinking','working'],
  qa:        ['working','blocked','working','working','thinking','coffee_break','working','working'],
  tester:    ['working','working','thinking','blocked','working','coffee_break','working','working'],
};
const AGENT_TASKS = {
  working:['Building feature...','Reviewing code...','Writing tests...','Fixing pipeline...','Updating docs...','Optimizing API...'],
  thinking:['Planning sprint...','Analyzing metrics...','Researching solution...'],
  blocked:['Waiting for unblock...','Dependency pending...'],
  in_meeting:['Meeting in progress...','Sprint planning...'],
  coffee_break:[''],
  idle:[''],
};
const AGENT_TASK_IDX = {};
AGENT_LIST.forEach((a,i) => { AGENT_TASK_IDX[a.id] = i % 8; });

setInterval(() => {
  doWalkTick();
  if (dataSource === 'SIMULATED') runSimulation();
}, 200);

let simTick = 0;
const SIM_TICKS_PER_STEP = 15;
function runSimulation() {
  simTick++;
  AGENT_LIST.forEach(agent => {
    const st = agentState[agent.id];
    const script = AGENT_SCRIPTS[agent.id] || ['working','idle'];
    const step = Math.floor(simTick / SIM_TICKS_PER_STEP) % script.length;
    const newStatus = script[step];
    if (newStatus === st.status) return;
    const taskList = AGENT_TASKS[newStatus] || [''];
    const taskIdx = (AGENT_TASK_IDX[agent.id] + step) % taskList.length;
    const task = taskList[taskIdx];
    const progress = newStatus === 'working' ? ((AGENT_TASK_IDX[agent.id] * 13 + step * 17) % 71) + 15 : 0;
    applyStatus(agent.id, newStatus, task, progress);
  });
  if (currentTab === 'cards') updateCards();
}

// ==================== DATA POLL ====================
fetchQueue();
setInterval(fetchQueue, 30000);
window.addEventListener('focus', fetchQueue);

// ==================== INIT STATES ====================
const initStates = [
  ['frontend','working','Building v15 pixel canvas...',72,null,null,'critical'],
  ['trump','working','Coordinating all agents...',45,null,'frontend','high'],
  ['pm','working','Writing sprint spec...',88,null,null,'normal'],
  ['uiux','working','Designing new screens...',60,null,'frontend','normal'],
  ['qa','blocked','Waiting for build...',30,'frontend',null,'normal'],
  ['devops','working','Setting up CI pipeline...',55,null,null,'normal'],
  ['jacques','working','Reviewing product direction...',80,null,null,'normal'],
  ['backend','working','API endpoint optimization...',40,null,null,'normal'],
  ['designer','working','Design system update...',65,null,null,'normal'],
];
initStates.forEach(([id,status,task,prog,blocked,collab,priority]) => {
  const st = agentState[id];
  if (st) { st.status=status; st.task=task; st.progress=prog; st.blocked_by=blocked; st.collaborating_with=collab; st.priority=priority; }
});

setTimeout(() => {
  agentState['ops'].status = 'coffee_break';
  walkTo('ops', COFFEE_TILE);
  agentState['marketing'].status = 'coffee_break';
  walkTo('marketing', COFFEE_TILE);
}, 2000);

setTimeout(() => {
  agentState['trump'].status = 'in_meeting';
  agentState['trump'].collaborating_with = 'frontend';
  agentState['frontend'].status = 'in_meeting';
  agentState['frontend'].collaborating_with = 'trump';
  walkTo('trump', MEET_A_SEATS[0]);
  walkTo('frontend', MEET_A_SEATS[1]);
}, 5000);

// ==================== START ====================
animFrame = requestAnimationFrame(render);
applyScale();
</script>
