<style>

body{background:#0A0A14;font-family:'Press Start 2P','Courier New',monospace;overflow:hidden;user-select:none}

.tab:hover{background:#303048}
.tab.active{background:#3A3A5A;color:#F8F8F8}
.tab.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:#F8F8F8}

#clock{color:#78D8A8;font-size:9px;font-family:'Press Start 2P','Courier New',monospace;letter-spacing:0.1em}
#data-badge{font-size:8px;padding:2px 6px;background:#202838;color:#78D8A8;border:1px solid #304848;font-family:'Press Start 2P','Courier New',monospace;letter-spacing:0.05em}
#data-badge.offline{background:#383020;color:#D8A828;border-color:#485030}

<script>
// ==================== CONSTANTS ====================
const T = 48; // tile size px
const COLS = 30;
const ROWS = 18;
const CANVAS_W = 1440;
const CANVAS_H = 864;

// ==================== ROOMS ====================
const ROOMS = [
  {id:'exec', name:'Executive Suite', col:0, row:0, w:8, h:6, floorType:'wood', wallColor:'#F5EDD8', wallShadow:'#D4C8A8'},
  {id:'tech', name:'Tech Lab', col:9, row:0, w:12, h:6, floorType:'tech', wallColor:'#4A5568', wallShadow:'#2D3748'},
  {id:'pm', name:'Strategy', col:22, row:0, w:8, h:6, floorType:'wood2', wallColor:'#9BB59B', wallShadow:'#7A9478'},
  {id:'design', name:'Design Studio', col:0, row:7, w:10, h:7, floorType:'wood3', wallColor:'#C47B5A', wallShadow:'#A05A3A'},
  {id:'meetA', name:'Meeting Room A', col:11, row:7, w:8, h:5, floorType:'carpetBlue', wallColor:'#3D4A5A', wallShadow:'#2A3545'},
  {id:'meetB', name:'Meeting Room B', col:11, row:12, w:8, h:5, floorType:'carpetGreen', wallColor:'#2D5A3D', wallShadow:'#1E3D28'},
  {id:'qa', name:'QA Lab', col:20, row:7, w:10, h:7, floorType:'techQA', wallColor:'#2A6DB5', wallShadow:'#1A4D90'},
  {id:'break', name:'Break Room', col:0, row:14, w:30, h:3, floorType:'terra', wallColor:'#B05A3A', wallShadow:'#883820'},
];

// ==================== WALKABLE SET ====================
const WALKABLE = new Set();
// V-Corridor-A: col 8, rows 0-5
for(let r=0;r<=5;r++) WALKABLE.add(`${8},${r}`);
// V-Corridor-B: col 21, rows 0-5
for(let r=0;r<=5;r++) WALKABLE.add(`${21},${r}`);
// H-Main: row 6, all cols
for(let c=0;c<=29;c++) WALKABLE.add(`${c},${6}`);
// V-Med-Left: col 10, rows 7-16
for(let r=7;r<=16;r++) WALKABLE.add(`${10},${r}`);
// V-Med-Right: col 19, rows 7-16
for(let r=7;r<=16;r++) WALKABLE.add(`${19},${r}`);
// H-Bottom: row 17
for(let c=0;c<=29;c++) WALKABLE.add(`${c},${17}`);
// Break room: rows 14-16, all cols
for(let r=14;r<=16;r++) for(let c=0;c<=29;c++) WALKABLE.add(`${c},${r}`);
// Meeting A: walkable border tiles (around table)
for(let c=11;c<=18;c++) { WALKABLE.add(`${c},7`); WALKABLE.add(`${c},11`); }
for(let r=7;r<=11;r++) { WALKABLE.add(`11,${r}`); WALKABLE.add(`18,${r}`); }
// Meeting B: walkable border tiles
for(let c=11;c<=18;c++) { WALKABLE.add(`${c},12`); WALKABLE.add(`${c},16`); }
for(let r=12;r<=16;r++) { WALKABLE.add(`11,${r}`); WALKABLE.add(`18,${r}`); }
// Room interiors (desks walkable at desk pos itself + adjacent)
// Executive Suite (cols 0-7, rows 0-5)
for(let c=0;c<=7;c++) for(let r=0;r<=5;r++) WALKABLE.add(`${c},${r}`);
// Tech Lab (cols 9-20, rows 0-5)
for(let c=9;c<=20;c++) for(let r=0;r<=5;r++) WALKABLE.add(`${c},${r}`);
// PM office (cols 22-29, rows 0-5)
for(let c=22;c<=29;c++) for(let r=0;r<=5;r++) WALKABLE.add(`${c},${r}`);
// Design Studio (cols 0-9, rows 7-13)
for(let c=0;c<=9;c++) for(let r=7;r<=13;r++) WALKABLE.add(`${c},${r}`);
// QA Lab (cols 20-29, rows 7-13)
for(let c=20;c<=29;c++) for(let r=7;r<=13;r++) WALKABLE.add(`${c},${r}`);
// Block furniture tiles
const BLOCKED = new Set([
  '0,0','1,0','0,1','1,1', // exec bookshelf
  '20,1','20,2','20,3', // tech server rack
  '29,0','29,1','29,2', // pm whiteboard
  '0,7','0,8','0,9', // design art shelf
  '8,7','9,7', // design display
  '29,7','29,8','29,9','29,10', // qa device shelf
  '20,7','20,8','20,9', // qa bug board
  '13,8','14,8','15,8','16,8', // meeting A table
  '13,9','14,9','15,9','16,9',
  '13,10','14,10','15,10','16,10',
  '13,13','14,13','15,13','16,13', // meeting B table
  '13,14','14,14','15,14','16,14',
  '13,15','14,15','15,15','16,15',
]);
BLOCKED.forEach(k => WALKABLE.delete(k));

// ==================== AGENTS ====================
const AGENT_LIST = [
  {id:'jacques', name:'Jacques', role:'CEO', dept:'exec', desk:{col:2,row:2}, room:'exec', spriteKey:'jacques'},
  {id:'trump', name:'Trump', role:'Assistant', dept:'exec', desk:{col:5,row:2}, room:'exec', spriteKey:'trump'},
  {id:'ops', name:'Operations', role:'COO', dept:'exec', desk:{col:2,row:4}, room:'exec', spriteKey:'ops'},
  {id:'growth', name:'Growth', role:'Head of Growth', dept:'exec', desk:{col:5,row:4}, room:'exec', spriteKey:'growth'},
  {id:'frontend', name:'Frontend', role:'Sr. FE Engineer', dept:'tech', desk:{col:10,row:1}, room:'tech', spriteKey:'frontend'},
  {id:'backend', name:'Backend', role:'Sr. BE Engineer', dept:'tech', desk:{col:12,row:1}, room:'tech', spriteKey:'backend'},
  {id:'devops', name:'DevOps', role:'DevOps Engineer', dept:'tech', desk:{col:14,row:1}, room:'tech', spriteKey:'devops'},
  {id:'data', name:'Data', role:'Data Engineer', dept:'tech', desk:{col:16,row:1}, room:'tech', spriteKey:'data'},
  {id:'security', name:'Security', role:'Sec. Engineer', dept:'tech', desk:{col:18,row:1}, room:'tech', spriteKey:'security'},
  {id:'arch', name:'Tech Architect', role:'Architect', dept:'tech', desk:{col:11,row:4}, room:'tech', spriteKey:'arch'},
  {id:'research', name:'Research', role:'Researcher', dept:'tech', desk:{col:14,row:4}, room:'tech', spriteKey:'research'},
  {id:'analytics', name:'Analytics', role:'Data Analyst', dept:'tech', desk:{col:17,row:4}, room:'tech', spriteKey:'analytics'},
  {id:'pm', name:'PM', role:'Product Manager', dept:'pm', desk:{col:23,row:1}, room:'pm', spriteKey:'pm'},
  {id:'product', name:'Product', role:'Product Lead', dept:'pm', desk:{col:26,row:1}, room:'pm', spriteKey:'product'},
  {id:'marketing', name:'Marketing', role:'Marketing Lead', dept:'pm', desk:{col:23,row:4}, room:'pm', spriteKey:'marketing'},
  {id:'sales', name:'Sales', role:'Sales Lead', dept:'pm', desk:{col:26,row:4}, room:'pm', spriteKey:'sales'},
  {id:'designer', name:'Chief Designer', role:'Design Director', dept:'design', desk:{col:2,row:8}, room:'design', spriteKey:'designer'},
  {id:'uiux', name:'UIUX', role:'UI/UX Designer', dept:'design', desk:{col:5,row:8}, room:'design', spriteKey:'uiux'},
  {id:'content', name:'Content', role:'Content Writer', dept:'design', desk:{col:2,row:11}, room:'design', spriteKey:'content'},
  {id:'cs', name:'Customer Success', role:'CS Lead', dept:'design', desk:{col:5,row:11}, room:'design', spriteKey:'cs'},
  {id:'qa', name:'QA', role:'QA Engineer', dept:'qa', desk:{col:22,row:9}, room:'qa', spriteKey:'qa'},
  {id:'tester', name:'Tester', role:'Test Engineer', dept:'qa', desk:{col:26,row:9}, room:'qa', spriteKey:'tester'},
];

// Dept colors for card borders
const DEPT_COLORS = {exec:'#F0C060',tech:'#78B8F8',design:'#78D878',pm:'#50C8D8',qa:'#A878E8'};

// ==================== AGENT STATE ====================
const agentState = {};
AGENT_LIST.forEach((a, idx) => {
  agentState[a.id] = {
    status: 'idle', task: '', progress: 0, blocked_by: null,
    collaborating_with: null, priority: null, last_updated: '',
    currentTile: {...a.desk},
    targetTile: {...a.desk},
    path: [],
    facing: 'south', // south/north/east/west
    walkFrame: 0,
    idleTimer: 0,
    animPhase: (idx * 1.618033) % (Math.PI * 2), // deterministic golden-ratio offset per agent
    atHome: true,
  };
});

// ==================== MEETING SEATS ====================
const MEET_A_SEATS = [
  {col:13,row:7},{col:14,row:7},{col:15,row:7},{col:16,row:7}, // north
  {col:13,row:11},{col:14,row:11},{col:15,row:11},{col:16,row:11}, // south
  {col:11,row:9},{col:18,row:9} // sides
];
const MEET_B_SEATS = [
  {col:13,row:12},{col:14,row:12},{col:15,row:12},{col:16,row:12}, // north
  {col:13,row:16},{col:14,row:16},{col:15,row:16},{col:16,row:16}, // south
  {col:11,row:14},{col:18,row:14} // sides
];
const COFFEE_TILE = {col:12, row:15};

// Meeting pairs → room
const MEETING_PAIRS = [
  ['pm','frontend','A'],['pm','backend','A'],['pm','designer','B'],['pm','uiux','B'],
  ['frontend','uiux','A'],['frontend','qa','B'],['backend','frontend','A'],
  ['backend','data','A'],['arch','frontend','A'],['arch','backend','A'],
  ['designer','uiux','B'],['qa','tester','B'],['marketing','sales','B'],
  ['analytics','pm','A'],['trump','jacques','A'],['ops','growth','B'],
  ['devops','backend','A'],['devops','security','A'],['research','product','B'],
  ['product','pm','A'],['cs','marketing','B'],['content','marketing','B'],
];

// ==================== PATHFINDING ====================
function findPath(from, to) {
  const startKey = `${from.col},${from.row}`;
  const endKey = `${to.col},${to.row}`;
  if (startKey === endKey) return [];
  
  const queue = [[from, []]];
  const visited = new Set([startKey]);
  const dirs = [{dc:0,dr:-1},{dc:0,dr:1},{dc:-1,dr:0},{dc:1,dr:0}];
  
  while (queue.length > 0) {
    const [cur, path] = queue.shift();
    for (const {dc,dr} of dirs) {
      const nc = cur.col+dc, nr = cur.row+dr;
      const key = `${nc},${nr}`;
      if (nc<0||nc>=COLS||nr<0||nr>=ROWS) continue;
      if (!WALKABLE.has(key) || BLOCKED.has(key)) continue;
      if (visited.has(key)) continue;
      visited.add(key);
      const newPath = [...path, {col:nc,row:nr}];
      if (key === endKey) return newPath;
      queue.push([{col:nc,row:nr}, newPath]);
    }
  }
  return [];
}

function getFacing(from, to) {
  if (!to) return 'south';
  const dc = to.col - from.col;
  const dr = to.row - from.row;
  if (Math.abs(dc) >= Math.abs(dr)) return dc > 0 ? 'east' : 'west';
  return dr > 0 ? 'south' : 'north';
}

// ==================== WALK SYSTEM ====================
let walkTick = 0;
function doWalkTick() {
  walkTick++;
  AGENT_LIST.forEach(agent => {
    const st = agentState[agent.id];
    if (st.path.length > 0) {
      const next = st.path.shift();
      st.facing = getFacing(st.currentTile, next);
      st.currentTile = next;
      st.walkFrame = (st.walkFrame + 1) % 4;
      // Check if arrived
      if (st.path.length === 0) {
        const cur = st.currentTile;
        const tgt = st.targetTile;
        if (cur.col === tgt.col && cur.row === tgt.row) {
          st.atHome = (cur.col === agent.desk.col && cur.row === agent.desk.row);
          // Snap facing to south when at desk
          if (st.atHome) st.facing = 'south';
        }
      }
    } else {
      st.walkFrame = 0;
    }
  });
}

function walkTo(agentId, targetTile) {
  const st = agentState[agentId];
  const tKey = `${targetTile.col},${targetTile.row}`;
  const cKey = `${st.currentTile.col},${st.currentTile.row}`;
  if (tKey === cKey) return;
  // If target is a wall tile, skip (stay put)
  if (WALL_BLOCKED.has(tKey)) return;
  st.targetTile = {...targetTile};
  const path = findPath(st.currentTile, targetTile);
  st.path = path;
}

function walkHome(agentId) {
  const agent = AGENT_LIST.find(a => a.id === agentId);
  if (agent) walkTo(agentId, agent.desk);
}

// ==================== SIMULATION (fallback) ====================
let simTime = 0;
// Deterministic per-agent scripts (no Math.random)
const AGENT_SCRIPTS = {
  jacques:   ['working','working','working','working','thinking','working','working','working'],
  trump:     ['working','working','in_meeting','working','working','thinking','working','coffee_break'],
  ops:       ['working','working','coffee_break','working','working','idle','working','working'],
  growth:    ['working','thinking','working','working','coffee_break','working','working','idle'],
  frontend:  ['working','working','working','coffee_break','working','blocked','working','working'],
  backend:   ['working','working','blocked','working','working','thinking','working','coffee_break'],
  devops:    ['working','working','working','thinking','working','working','coffee_break','working'],
  data:      ['working','working','thinking','working','idle','working','working','working'],
  security:  ['working','thinking','working','working','working','coffee_break','working','blocked'],
  arch:      ['working','working','working','in_meeting','working','working','thinking','working'],
  research:  ['working','thinking','working','working','coffee_break','working','working','idle'],
  analytics: ['working','working','working','thinking','working','coffee_break','blocked','working'],
  pm:        ['working','working','working','in_meeting','thinking','working','working','coffee_break'],
  product:   ['working','working','thinking','working','working','in_meeting','working','coffee_break'],
  marketing: ['working','coffee_break','working','working','thinking','working','working','idle'],
  sales:     ['working','working','working','coffee_break','blocked','working','thinking','working'],
  designer:  ['working','working','thinking','working','working','coffee_break','working','idle'],
  uiux:      ['working','working','working','thinking','in_meeting','working','coffee_break','working'],
  content:   ['working','thinking','working','working','coffee_break','working','idle','working'],
  cs:        ['working','working','coffee_break','blocked','working','working','thinking','working'],
  qa:        ['working','blocked','working','working','thinking','coffee_break','working','working'],
  tester:    ['working','working','thinking','blocked','working','coffee_break','working','working'],
};
const AGENT_TASKS = {
  working: ['Building feature...','Reviewing code...','Writing tests...','Fixing pipeline...','Updating docs...','Optimizing API...','Refactoring module...','Code review...'],
  thinking: ['Planning sprint...','Analyzing metrics...','Researching solution...','Evaluating options...'],
  blocked: ['Waiting for unblock...','Dependency pending...','Blocked on review...'],
  in_meeting: ['Meeting in progress...','Sprint planning...','Design review...'],
  coffee_break: [''],
  idle: [''],
};
const AGENT_TASK_IDX = {};
AGENT_LIST.forEach((a,i) => { AGENT_TASK_IDX[a.id] = i % 8; });

// NOTE: only one runSimulation definition — the deterministic one below

function applyStatus(agentId, status, task, progress, blockedBy, collabWith, priority) {
  const st = agentState[agentId];
  const agent = AGENT_LIST.find(a => a.id === agentId);
  st.status = status;
  st.task = task || '';
  st.progress = progress || 0;
  st.blocked_by = blockedBy || null;
  st.collaborating_with = collabWith || null;
  st.priority = priority || null;
  
  if (status === 'coffee_break') {
    walkTo(agentId, COFFEE_TILE);
  } else if (status === 'idle' || status === 'working' || status === 'blocked' || status === 'done' || status === 'error') {
    // walk home if not there
    const cur = st.currentTile;
    if (cur.col !== agent.desk.col || cur.row !== agent.desk.row) {
      walkHome(agentId);
    }
  }
}

// ==================== MEETING TRIGGERS ====================
// Track current meeting state: agentId → { roomId, seatIndex }
const meetingState = {};

function processMeetings(queueData) {
  if (!queueData) return;
  const meetAOccupied = [];
  const meetBOccupied = [];
  
  MEETING_PAIRS.forEach(([a1, a2, room]) => {
    const s1 = agentState[a1];
    const s2 = agentState[a2];
    if (!s1 || !s2) return;
    
    const collab = (s1.collaborating_with === a2 || s2.collaborating_with === a1) &&
                   (s1.status === 'in_meeting' || s1.status === 'reviewing' ||
                    s2.status === 'in_meeting' || s2.status === 'reviewing');
    
    // If they are already seated in meeting, skip re-assignment
    if (meetingState[a1] && meetingState[a2]) return;
    
    if (!collab) {
      // Clear meeting state if no longer meeting
      if (meetingState[a1]) delete meetingState[a1];
      if (meetingState[a2]) delete meetingState[a2];
      return;
    }
    
    const seats = room === 'A' ? MEET_A_SEATS : MEET_B_SEATS;
    const occupied = room === 'A' ? meetAOccupied : meetBOccupied;
    
    if (occupied.length + 2 > seats.length) return;
    
    const seatIdx1 = occupied.length;
    const seatIdx2 = occupied.length + 1;
    const seat1 = seats[seatIdx1];
    const seat2 = seats[seatIdx2];
    occupied.push(a1, a2);
    
    // Record meeting state
    meetingState[a1] = { roomId: room, seatIndex: seatIdx1 };
    meetingState[a2] = { roomId: room, seatIndex: seatIdx2 };
    
    walkTo(a1, seat1);
    walkTo(a2, seat2);
  });
}

// ==================== DATA FETCHING ====================
let lastGoodData = null;
let dataSource = 'SIMULATED';

async function fetchQueue() {
  try {
    const resp = await fetch('/data/work-queue.json', {cache:'no-store'});
    if (!resp.ok) throw new Error('non-ok');
    const data = await resp.json();
    lastGoodData = data;
    dataSource = 'LIVE';
    updateBadge('LIVE', false);
    applyQueueData(data);
  } catch(e) {
    if (lastGoodData) {
      dataSource = 'CACHED';
      updateBadge('CACHED', true);
    } else {
      dataSource = 'SIMULATED';
      updateBadge('SIM', false, true);
    }
  }
}

function updateBadge(text, offline, sim) {
  const el = document.getElementById('data-badge');
  el.textContent = text;
  el.className = offline ? 'offline' : (sim ? 'simulated' : '');
}

function applyQueueData(data) {
  if (!Array.isArray(data)) return;
  data.forEach(entry => {
    const agent = AGENT_LIST.find(a => a.name === entry.agent || a.id === entry.agent);
    if (!agent) return;
    applyStatus(agent.id, entry.status || 'idle', entry.task || '', 
      entry.progress || 0, entry.blocked_by, entry.collaborating_with, entry.priority);
    agentState[agent.id].last_updated = entry.last_updated || '';
  });
  processMeetings(data);
  if (currentTab === 'cards') updateCards();
}

// Draw pixel-art sprites on canvas at (px, py) with scale S
// Base: 16x24 logical pixels, drawn as S-scaled rectangles
const S = 3; // sprite scale (3x = 48x72)

function px(ctx, x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x, y, w*S, h*S);
}

function darken(hex, factor) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  const nr = Math.round(r*factor), ng = Math.round(g*factor), nb = Math.round(b*factor);
  return '#' + [nr,ng,nb].map(v=>Math.min(255,v).toString(16).padStart(2,'0')).join('');
}
function lighten(hex, factor) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  const nr = Math.min(255,Math.round(r*factor)), ng = Math.min(255,Math.round(g*factor)), nb = Math.min(255,Math.round(b*factor));
  return '#' + [nr,ng,nb].map(v=>v.toString(16).padStart(2,'0')).join('');
}

// Generic body draw helper relative to sprite origin
function drawBody(ctx, ox, oy, opts) {

  const {hair='#3A2010',skin='#E8C898',shirt='#3A6AB0',pants='#2A3848',eyes='#282828'} = opts;
  const shirtDark = darken(shirt, 0.7);

  // Hair / Head top (rows 0-3, cols 2-14)
  px(ctx,ox+2*S,oy+0*S,12,4,hair);

  px(ctx,ox+2*S,oy+0*S,2,2,hairLight);
  // Face (rows 3-8, cols 2-14)

function spriteForAgent(agent, frame) {
  // Returns offscreen canvas
  const oc = document.createElement('canvas');

  ctx.imageSmoothingEnabled = false;
  if (agent.spriteKey === 'jacques') drawJacques(ctx, 0, 0, frame||0);

  else drawAgent(ctx, 0, 0, agent.spriteKey, frame||0);
  return oc;
}

// Cache sprite canvases
const spriteCache = {};
function getSprite(agentId, frame) {
  const key = `${agentId}_${frame}`;
  if (!spriteCache[key]) {
    const agent = AGENT_LIST.find(a => a.id === agentId);
    spriteCache[key] = spriteForAgent(agent, frame);
  }
  return spriteCache[key];
}

// ==================== FLOOR TILE PATTERNS ====================
function makeFloorPattern(ctx, type) {
  const pc = document.createElement('canvas');
  pc.width = 48; pc.height = 48;
  const pctx = pc.getContext('2d');
  
  switch(type) {
    case 'wood': case 'wood2': case 'wood3': {
      const baseColor = type==='wood'?'#C8A46E':type==='wood2'?'#D8B880':'#E8C890';
      const darkLine = '#A07848';
      const highlight = '#D4B478';
      pctx.fillStyle = baseColor;
      pctx.fillRect(0,0,48,48);
      // Plank lines every 16px
      [0,16,32].forEach(y => {
        // highlight at top of plank
        pctx.fillStyle = highlight;
        pctx.fillRect(0,y,48,3);
        // dark gap at bottom
        if (y>0) {
          pctx.fillStyle = darkLine;
          pctx.fillRect(0,y,48,2);
        }
      });
      // subtle grain
      pctx.fillStyle = 'rgba(160,120,72,0.2)';
      for(let x=0;x<48;x+=8) pctx.fillRect(x,0,1,48);
      break;
    }
    case 'stone': {
      // Checkerboard 8x8
      for(let cy=0;cy<6;cy++) for(let cx=0;cx<6;cx++) {
        pctx.fillStyle = (cx+cy)%2===0?'#C8C8C0':'#A0A090';
        pctx.fillRect(cx*8,cy*8,8,8);
      }
      pctx.fillStyle = '#787870';
      for(let i=0;i<=48;i+=8) {
        pctx.fillRect(i,0,1,48);
        pctx.fillRect(0,i,48,1);
      }
      break;
    }
    case 'tech': case 'techQA': {
      const base = type==='techQA'?'#DDE8EE':'#E8EEF4';
      pctx.fillStyle = base;
      pctx.fillRect(0,0,48,48);
      pctx.fillStyle = '#C8D4DC';
      pctx.fillRect(24,0,1,48);
      pctx.fillRect(0,24,48,1);
      // Corner dots
      [[1,1],[1,46],[46,1],[46,46]].forEach(([x,y])=>{
        pctx.fillStyle='#B0C0CC';
        pctx.fillRect(x,y,2,2);
      });
      break;
    }
    case 'carpetBlue': {
      pctx.fillStyle = '#6B8CB8';
      pctx.fillRect(0,0,48,48);
      pctx.fillStyle = '#5A7AA8';
      for(let cy=0;cy<3;cy++) for(let cx=0;cx<3;cx++) {
        pctx.fillRect(cx*16+7,cy*16+7,2,2);
      }
      pctx.fillStyle = '#4A6A96';
      pctx.fillRect(0,0,48,1);
      pctx.fillRect(0,47,48,1);
      break;
    }
    case 'carpetGreen': {
      pctx.fillStyle = '#6BAF7A';
      pctx.fillRect(0,0,48,48);
      pctx.fillStyle = '#589A68';
      for(let cy=0;cy<3;cy++) for(let cx=0;cx<3;cx++) {
        pctx.fillRect(cx*16+7,cy*16+7,2,2);
      }
      pctx.fillStyle = '#4A8A58';
      pctx.fillRect(0,0,48,1);
      pctx.fillRect(0,47,48,1);
      break;
    }
    case 'terra': {
      pctx.fillStyle = '#D4956A';
      pctx.fillRect(0,0,48,48);
      pctx.fillStyle = '#E8A870';
      pctx.fillRect(0,0,15,15);
      pctx.fillStyle = '#B07050';
      pctx.fillRect(33,33,15,15);
      pctx.fillStyle = '#C07858';
      pctx.fillRect(24,0,1,48);
      pctx.fillRect(0,24,48,1);
      break;
    }
    default: {
      pctx.fillStyle = '#A0A0A0';
      pctx.fillRect(0,0,48,48);
    }
  }
  const pat = ctx.createPattern(pc, 'repeat');
  return pat || null;
}

// ==================== MEETING TABLE HELPER ====================
function drawMeetingTable(ctx, tx, ty) {
  // Pixel-art oval table via horizontal rectangle slices
  const rowData = [
    [1.2*T,0.4*T],[1.8*T,0.4*T],[2.1*T,0.4*T],[2.2*T,0.4*T],[2.2*T,0.4*T],
    [2.2*T,0.4*T],[2.1*T,0.4*T],[1.8*T,0.4*T],[1.2*T,0.4*T],
  ];
  rowData.forEach(([w,h],i) => {
    const cx = tx + (2.2*T - w)/2;
    const ry = ty + i*h;
    ctx.fillStyle = '#A87840';
    ctx.fillRect(Math.round(cx),Math.round(ry),Math.round(w),Math.round(h)+2);
  });
  // inner lighter surface
  const innerData = [
    [0.8*T,0.4*T],[1.4*T,0.4*T],[1.7*T,0.4*T],[1.8*T,0.4*T],[1.8*T,0.4*T],
    [1.8*T,0.4*T],[1.7*T,0.4*T],[1.4*T,0.4*T],[0.8*T,0.4*T],
  ];
  innerData.forEach(([w,h],i) => {
    const cx = tx + (2.2*T - w)/2;
    const ry = ty + i*h + 4;
    ctx.fillStyle = '#C89858';
    ctx.fillRect(Math.round(cx+4),Math.round(ry),Math.round(w-8),Math.round(h));
  });
}

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

// Build floor patterns lazily
const floorPatterns = {};
function getPattern(type) {
  if (!floorPatterns[type]) floorPatterns[type] = makeFloorPattern(ctx, type);
  return floorPatterns[type];
}

function drawFloor() {
  // Draw each room's floor
  ROOMS.forEach(room => {
    const pattern = getPattern(room.floorType || 'stone');
    ctx.fillStyle = pattern || '#C8904A';
    ctx.fillRect(room.col*T, room.row*T, room.w*T, room.h*T);
    
    // North wall (top edge of room)
    ctx.fillStyle = room.wallColor;
    ctx.fillRect(room.col*T, room.row*T, room.w*T, 8);
    ctx.fillStyle = room.wallShadow;
    ctx.fillRect(room.col*T, (room.row*T)+6, room.w*T, 4);
  });
  
  // Corridors
  const corridorPattern = getPattern('stone');
  ctx.fillStyle = corridorPattern;
  // V-Corridor-A
  ctx.fillRect(8*T, 0, T, 6*T);
  // V-Corridor-B
  ctx.fillRect(21*T, 0, T, 6*T);
  // H-Main
  ctx.fillRect(0, 6*T, CANVAS_W, T);
  // V-Med-Left
  ctx.fillRect(10*T, 7*T, T, 10*T);
  // V-Med-Right
  ctx.fillRect(19*T, 7*T, T, 10*T);
  // H-Bottom
  ctx.fillRect(0, 17*T, CANVAS_W, T);
  
  // Room labels (name at top-left of floor area, subtle)
  ctx.font = '8px "Press Start 2P", "Courier New", monospace';
  ctx.textAlign = 'left';
  ROOMS.forEach(room => {
    if (room.id === 'break') return;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(room.col*T+2, room.row*T+8, ctx.measureText(room.name).width+6, 13);
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillText(room.name, room.col*T+4, room.row*T+18);
  });
  ctx.textAlign = 'left';
}

  ctx.fillRect(Math.round(cx+3), Math.round(cy+4), 17, 2);

const STATUS_COLORS = {
  idle:'#909090', working:'#40C860', blocked:'#E04040',
  in_meeting:'#4888D8', reviewing:'#9848C8', coffee_break:'#B07030',
  done:'#F0C020', error:'#E02020', default:'#909090'
};


// ==================== ANIM TICK (for pulse/steam) ====================
let animTick = 0;
setInterval(() => { animTick++; }, 50); // ~20fps tick for animations

// ==================== STATUS BUBBLE CONFIG ====================
function getStatusBubble(status) {
  switch(status) {
    case 'working': case 'in_progress': return { color:'#E84040', text:'BUSY', pulse:true };
    case 'in_meeting': case 'reviewing': return { color:'#E84040', text:'MTG', pulse:false };
    case 'blocked': case 'error': return { color:'#F5A623', text:'BLOCK', pulse:true };
    case 'pending': case 'pending_review': case 'pending_test': case 'waiting': return { color:'#F5A623', text:'WAIT', pulse:false };
    case 'coffee_break': return { color:'#F5C84A', text:'☕', pulse:false };
    case 'thinking': return { color:'#F5A623', text:'WAIT', pulse:false };
    case 'idle': return { color:'#52C41A', text:'ZZ', pulse:false };
    case 'done': return { color:'#52C41A', text:'✓', pulse:false };
    default: return null;
  }
}

function drawStatusBubble(ctx, cx, cy, status) {
  const bubble = getStatusBubble(status);
  if (!bubble) return;
  const R = 7;
  let scale = 1.0;
  if (bubble.pulse) {
    scale = 1.0 + 0.2 * Math.sin(animTick * 0.18);
  }
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(scale, scale);
  // Background circle
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.beginPath(); ctx.arc(0, 0, R+1.5, 0, Math.PI*2); ctx.fill();
  // Colored circle
  ctx.fillStyle = bubble.color;
  ctx.beginPath(); ctx.arc(0, 0, R, 0, Math.PI*2); ctx.fill();
  // Text
  ctx.fillStyle = '#FFFFFF';
  ctx.font = `bold 6px "Press Start 2P", "Courier New", monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const t = bubble.text;
  if (t === '☕' || t === '✓') {
    ctx.font = 'bold 8px serif';
  }
  ctx.fillText(t, 0, 0.5);
  ctx.restore();
  ctx.textBaseline = 'alphabetic';
}

// ==================== WALL COLLISION (blocked tiles set) ====================
const WALL_BLOCKED = new Set();
function buildWallBlockedSet() {
  ROOMS.forEach(room => {
    // Perimeter tiles of this room
    for (let c = room.col; c < room.col + room.w; c++) {
      for (let r = room.row; r < room.row + room.h; r++) {
        const isPerimeter = (c === room.col || c === room.col + room.w - 1 ||
                             r === room.row || r === room.row + room.h - 1);
        if (isPerimeter) {
          WALL_BLOCKED.add(`${c},${r}`);
        }
      }
    }
  });
  // Door gaps: 2-tile opening on the side facing the main corridor/center
  // We use a simple approach: open the side that's closest to a corridor
  // Main corridor is row 6; vertical corridors at col 8, 10, 19, 21
  // For each room, decide door side and position
  const doors = [
    // exec (row 0-5): door at bottom row=5, center col
    {c:3, r:5}, {c:4, r:5},
    // tech (row 0-5): door at bottom row=5
    {c:14, r:5}, {c:15, r:5},
    // pm (row 0-5): door at bottom row=5
    {c:25, r:5}, {c:26, r:5},
    // design (col 0-9, row 7-13): door at right col=9, center row
    {c:9, r:10}, {c:9, r:11},
    // meetA (col 11-18, row 7-11): door at left col=11 and right col=18
    {c:11, r:9}, {c:18, r:9},
    // meetB (col 11-18, row 12-16): door at left col=11 and right col=18
    {c:11, r:14}, {c:18, r:14},
    // qa (col 20-29, row 7-13): door at left col=20, center row
    {c:20, r:10}, {c:20, r:11},
    // break (row 14-16): full corridor anyway - open top row=14
    {c:5, r:14}, {c:6, r:14}, {c:14, r:14}, {c:15, r:14},
  ];
  doors.forEach(({c, r}) => WALL_BLOCKED.delete(`${c},${r}`));
}
buildWallBlockedSet();

// ==================== RENDER LOOP ====================
let animFrame = null;

function render(timestamp) {
  try {
    ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
    
    // Background
    ctx.fillStyle = '#0A0A14';
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
    
    // Floor and rooms
    drawFloor();
    
    // Furniture
    drawFurniture();
    
    // Agents
    drawAgentsFixed(timestamp);
  } catch(e) {
    console.error('[render error]', e);
  }
  animFrame = requestAnimationFrame(render);
}

function drawAgentsFixed(timestamp) {
  // Sort agents by row for y-depth
  const sorted = [...AGENT_LIST].sort((a,b) => {
    return agentState[a.id].currentTile.row - agentState[b.id].currentTile.row;
  });
  
  sorted.forEach(agent => {
    const st = agentState[agent.id];
    const tileCol = st.currentTile.col;
    const tileRow = st.currentTile.row;
    const tileX = tileCol * T;
    const tileY = tileRow * T;
    
    const spriteW = 16*S; // 48
    const spriteH = 24*S; // 72
    const spriteX = tileX + (T - spriteW)/2;
    const spriteY = tileY - spriteH + T; // bottom aligned to tile bottom
    
    // Walk/animation frame
    let frame = 0;
    if (st.path.length > 0) {
      frame = Math.floor(timestamp / 100) % 4;
    } else if (st.status === 'working') {
      frame = Math.floor(timestamp / 500) % 2 === 1 ? 1 : 0;
    }
    
    // Idle bob
    const bob = (st.status === 'idle') ?
      Math.round(Math.sin(timestamp/1500 + st.animPhase)) : 0;
    
    // Priority glow
    if (st.priority === 'critical') {
      const pulse = 0.5 + 0.5*Math.sin(timestamp/300);
      ctx.shadowColor = `rgba(255,32,32,${pulse})`;
      ctx.shadowBlur = 16;
    } else if (st.priority === 'high') {
      ctx.shadowColor = 'rgba(255,128,32,0.5)';
      ctx.shadowBlur = 10;
    }
    
    // Draw chair at desk position (always, even if agent away)
    drawChair(ctx, AGENT_LIST.find(a => a.id === agent.id).desk.col * T, AGENT_LIST.find(a => a.id === agent.id).desk.row * T);
    
    // Draw sprite (drawAgentsFixed)
    const sp = getSprite(agent.id, frame);
    const dotX = spriteX + spriteW / 2;
    const dotY = spriteY - 8 + bob;
    ctx.drawImage(sp, spriteX, spriteY + bob, spriteW, spriteH);
    // Reset shadow after drawing sprite to prevent bleed onto next agents
    ctx.shadowBlur = 0; ctx.shadowColor = 'transparent';
    const sColor = STATUS_COLORS[st.status] || STATUS_COLORS.default;
    ctx.fillStyle = 'rgba(16,16,24,0.75)';
    ctx.beginPath(); ctx.arc(dotX, dotY, 7, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = sColor;
    ctx.beginPath(); ctx.arc(dotX, dotY, 5, 0, Math.PI*2); ctx.fill();
    
    // Status bubble above sprite (spec: y = spriteCenter - spriteH/2 - 10 = spriteY - 10)
    const bubbleCX = spriteX + spriteW / 2;
    const bubbleCY = spriteY - 10 + bob;
    drawStatusBubble(ctx, bubbleCX, bubbleCY, st.status);
    
    // Name label
    ctx.font = '7px "Press Start 2P", "Courier New", monospace';
    ctx.textAlign = 'center';
    const nw = ctx.measureText(agent.name).width;
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillRect(dotX - nw/2 - 2, spriteY - 24 + bob, nw + 4, 11);
    ctx.fillStyle = '#FFFFFF';
    ctx.fillText(agent.name, dotX, spriteY - 15 + bob);
    ctx.textAlign = 'left';
    
    // Progress bar below agent tile
    if (st.status === 'working' && st.progress > 0) {
      const barY = tileY + T - 5;
      const barW = T - 4;
      ctx.fillStyle = '#282830';
      ctx.fillRect(tileX + 2, barY, barW, 4);
      const pc = st.progress < 34 ? '#E04848' : st.progress < 67 ? '#E0B828' : '#40C060';
      ctx.fillStyle = pc;
      ctx.fillRect(tileX + 2, barY, Math.round(barW * st.progress / 100), 4);
    }
    
    // Collaboration line (draw from center of agent tile)
    if (st.collaborating_with) {
      const oid = st.collaborating_with;
      const other = AGENT_LIST.find(a => a.id === oid || a.name === oid);
      if (other) {
        const ost = agentState[other.id];
        ctx.save();
        ctx.setLineDash([4, 4]);
        ctx.strokeStyle = 'rgba(74,144,217,0.55)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(tileX + T/2, tileY + T/2);
        ctx.lineTo(ost.currentTile.col*T + T/2, ost.currentTile.row*T + T/2);
        ctx.stroke();
        ctx.restore();
      }
    }
    
    // Blocked line
    if (st.blocked_by) {
      const oid = st.blocked_by;
      const other = AGENT_LIST.find(a => a.id === oid || a.name === oid);
      if (other) {
        const ost = agentState[other.id];
        ctx.save();
        ctx.setLineDash([3, 4]);
        ctx.strokeStyle = 'rgba(224,64,64,0.65)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(tileX + T/2, tileY + T/2);
        ctx.lineTo(ost.currentTile.col*T + T/2, ost.currentTile.row*T + T/2);
        ctx.stroke();
        ctx.restore();
      }
    }
  });
}

// ==================== CANVAS CLICK (TOOLTIP) ====================
const tooltip = document.getElementById('tooltip');
let tooltipAgent = null;

canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const scale = rect.width / CANVAS_W;
  const mx = (e.clientX - rect.left) / scale;
  const my = (e.clientY - rect.top) / scale;
  const tileCol = Math.floor(mx / T);
  const tileRow = Math.floor(my / T);
  
  const clicked = AGENT_LIST.find(a => {
    const st = agentState[a.id];
    return st.currentTile.col === tileCol && st.currentTile.row === tileRow;
  });
  
  if (clicked) {
    tooltipAgent = clicked.id;
    showTooltip(e.clientX, e.clientY, clicked);
    openSidePanel(clicked.id);
  } else {
    tooltip.style.display = 'none';
    tooltipAgent = null;
  }
});

document.addEventListener('click', e => {
  if (!canvas.contains(e.target) && !tooltip.contains(e.target)) {
    tooltip.style.display = 'none';
    tooltipAgent = null;
  }
});

function showTooltip(cx, cy, agent) {
  const st = agentState[agent.id];
  tooltip.querySelector('.tt-name').textContent = agent.name;
  tooltip.querySelector('.tt-role').textContent = agent.role;
  tooltip.querySelector('.tt-task').textContent = st.task ? `Task: ${st.task.substring(0,40)}` : 'No active task';
  tooltip.querySelector('.tt-progress-bar').style.width = `${st.progress || 0}%`;
  const pc = (st.progress||0) < 34 ? '#E04848' : (st.progress||0) < 67 ? '#E0B828' : '#40C060';
  tooltip.querySelector('.tt-progress-bar').style.background = pc;
  tooltip.querySelector('.tt-pct').textContent = `${st.progress||0}%`;
  
  const tipW = 180, tipH = 80;
  let tx = cx + 12, ty = cy - 20;
  if (tx + tipW > window.innerWidth) tx = cx - tipW - 12;
  if (ty + tipH > window.innerHeight) ty = cy - tipH;
  
  tooltip.style.left = tx + 'px';
  tooltip.style.top = ty + 'px';
  tooltip.style.display = 'block';
}

// ==================== SECURITY: HTML ESCAPE ====================

  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
// Alias per spec
const escapeHTML = escHtml;

document.getElementById('side-close').addEventListener('click', () => {

// ==================== AGENT CARDS TAB ====================
function buildCards() {
  const cardsView = document.getElementById('cards-view');
  cardsView.innerHTML = '<div id="cards-grid"></div>';
  const grid = cardsView.querySelector('#cards-grid');
  
  AGENT_LIST.forEach(agent => {
    const st = agentState[agent.id];
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.agentId = agent.id;
    
    // Avatar canvas
    const sp = getSprite(agent.id, 0);
    const ac = document.createElement('canvas');
    ac.width = 64; ac.height = 96;
    ac.className = 'card-avatar';
    ac.style.cssText = `width:64px;height:96px;border:2px solid ${DEPT_COLORS[agent.dept]||'#888'}`;
    const acc = ac.getContext('2d');
    acc.imageSmoothingEnabled = false;
    acc.drawImage(sp, 0, 0, 48, 72, 0, 0, 64, 96);
    
    const sColor = STATUS_COLORS[st.status] || '#909090';
    const progColor = (st.progress||0) < 34 ? '#E04848' : (st.progress||0) < 67 ? '#E0B828' : '#40C060';
    
    const info = document.createElement('div');
    info.className = 'card-info';
    info.innerHTML = `
      <div class="card-name">${escHtml(agent.name)}</div>
      <div class="card-role">${escHtml(agent.role)}</div>
      <div class="card-status"><span class="status-dot" style="background:${sColor}"></span><span style="color:${sColor};font-size:7px">${escHtml(st.status||'idle')}</span></div>
      <div class="card-task">${escHtml(st.task||'No active task')}</div>
      <div class="card-progress-wrap"><div class="card-progress-bar" style="width:${st.progress||0}%;background:${progColor}"></div></div>
      <div class="card-ts">${st.last_updated ? new Date(st.last_updated).toLocaleString() : 'No data'}</div>
    `;
    
    card.appendChild(ac);
    card.appendChild(info);
    card.addEventListener('click', () => {
      document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      openSidePanel(agent.id);
    });
    
    grid.appendChild(card);
  });
}

function updateCards() {
  AGENT_LIST.forEach(agent => {
    const st = agentState[agent.id];
    const card = document.querySelector(`.card[data-agent-id="${agent.id}"]`);
    if (!card) return;
    const sColor = STATUS_COLORS[st.status] || '#909090';
    const progColor = (st.progress||0) < 34 ? '#E04848' : (st.progress||0) < 67 ? '#E0B828' : '#40C060';
    
    const dot = card.querySelector('.status-dot');
    const stLabel = card.querySelector('.card-status span:last-child');
    const task = card.querySelector('.card-task');
    const bar = card.querySelector('.card-progress-bar');
    const ts = card.querySelector('.card-ts');
    
    if (dot) dot.style.background = sColor;
    if (stLabel) { stLabel.style.color = sColor; stLabel.textContent = st.status||'idle'; }
    if (task) task.textContent = st.task||'No active task';
    if (bar) { bar.style.width = `${st.progress||0}%`; bar.style.background = progColor; }
    if (ts) ts.textContent = st.last_updated ? new Date(st.last_updated).toLocaleString() : 'No data';
    
    // Update avatar sprite
    const ac = card.querySelector('canvas');
    if (ac) {
      const acc = ac.getContext('2d');
      acc.clearRect(0, 0, 64, 96);
      acc.imageSmoothingEnabled = false;
      const sp = getSprite(agent.id, 0);
      acc.drawImage(sp, 0, 0, 48, 72, 0, 0, 64, 96);
    }
  });
}

// ==================== AUTO-SCALE ====================
function applyScale() {
  const wrap = document.getElementById('office-scale');
  const scale = Math.min(1, window.innerWidth / CANVAS_W);
  wrap.style.transform = `scale(${scale})`;
  wrap.style.transformOrigin = 'top left';
  const h = CANVAS_H * scale;
  document.getElementById('office-wrap').style.height = h + 'px';
}

window.addEventListener('resize', applyScale);

  const now = new Date();
  const h = now.getHours().toString().padStart(2,'0');
  const m = now.getMinutes().toString().padStart(2,'0');
  const s = now.getSeconds().toString().padStart(2,'0');
  document.getElementById('clock').textContent = `${h}:${m}:${s}`;
}

// ==================== PERIODIC SIMULATION ====================
let simTick = 0;
const SIM_TICKS_PER_STEP = 15; // 15 walk ticks = 3s per script step

function runSimulation() {
  simTick++;
  AGENT_LIST.forEach((agent) => {
    const st = agentState[agent.id];
    const script = AGENT_SCRIPTS[agent.id] || ['working','idle'];
    const step = Math.floor(simTick / SIM_TICKS_PER_STEP) % script.length;
    const newStatus = script[step];
    
    if (newStatus === st.status) return; // No state change
    
    const taskList = AGENT_TASKS[newStatus] || [''];
    // Deterministic task selection using agent index
    const taskIdx = (AGENT_TASK_IDX[agent.id] + step) % taskList.length;
    const task = taskList[taskIdx];
    // Deterministic progress: derived from agent + step
    const progress = newStatus === 'working' ? ((AGENT_TASK_IDX[agent.id] * 13 + step * 17) % 71) + 15 : 0;
    
    applyStatus(agent.id, newStatus, task, progress);
    
    // Return home from coffee after 2 steps
    if (st.status === 'coffee_break' && newStatus !== 'coffee_break') {
      walkHome(agent.id);
    }
  });
  if (currentTab === 'cards') updateCards();
}
